body:
  text: 欽定四庫全書石鼓論語答問卷下宋戴溪撰子路第十三子路問政子曰先之勞之請益曰無倦先之勞之不出一事蓋不先施而徒曰勞之是所謂小惠未遍民弗從也然事亦須先識體子路為蒲宰使其民修溝瀆以民之勞煩苦也人與之簞食一壺漿孔子聞之使子貢止之曰汝以民為餓也何不白於君發倉廪以賑之而私以爾食餽之是汝明君之無惠而見巳之德美矣子路之意固將以勞民也而其失若此是得聖人之言而未得其所以言也他日治蒲既三年矣孔子過之曰吾見其政矣入其境田疇甚易草萊甚辟溝洫深治此其恭敬以信故其民盡力也入其境墻屋完固樹木甚茂此其忠信以寬故其民不擾也若此可謂先之勞之之功矣三年之久而其政始成非不倦何以及此仲弓為季氏宰問政子曰先有司赦小過舉賢才曰焉知賢才而舉之曰舉爾所知爾所不知人其舍諸前輩說先有司以為季氏之亂正由大夫侵權分守皆亂今仲弓為季氏宰問政告以先有司使魯之君臣各有司存則三家不治自服此夫子欲墮三都與正名於衛之意也子路曰衛君待子而為政子將奚先子曰必也正名乎子路曰有是哉子之迂也奚其正子曰野哉由也君子於其所不知蓋闕如也名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罰不中刑罰不中則民無所措手足故君子名之必可言也言之必可行也君子於其言無所苟而已矣前輩謂夫子為政於衛欲先正名必須教輒避位以遜其父則君臣父子之名正矣夫輒至於發兵拒父積年未定欲待夫子為政固將求安其位也而教之避位是宜子路以為迂也考之史記稱孔子自楚反衛是歲魯哀公六年也是時衛君輒父不得立在外諸侯數以為讓而孔子弟子多仕於衛衛君欲得孔子為政故子路來問以探夫子之意所以冉有子貢相語有夫子為衛君之說亦是見夫子自楚復衛意者欲仕於衛君乎由此觀之輒之有待於夫子其意可知矣夫子亦安能以一見之間使輒避位以遜其父乎故吾以為學者當識聖人之意子路設問以探聖人欲仕之意聖人不敢明白其不可蓋居是邑不非其大夫豈敢明言其不足仕乎蓋必也正名之意言必先正名而後可仕今衛之名不正甚矣彼既不肯正名是决不可仕也子路知聖人之意故有有是哉之語大有驚愕之意問道管他此等事作甚如今更說此事來可見迂闊且自為政何必問他名正與不正聖人聞他此說意者說道子路可是鄙野更不㑹說教委曲微辭之中義理自明如子路此言幾於戇矣大抵君子於理㑹未得處亦須仔細思量如何直截如此子路道正名是間慢事不知名不正則開口便說不得如何行得既行不得更說甚禮樂夫事成則禮樂興猶充實而有輝光也樊遲請學稼子曰吾不如老農請學為圃曰吾不如老圃樊遲出子曰小人哉樊須也上好禮則民莫敢不敬上好義則民莫敢不服上好信則民莫敢不用情夫如是則四方之民襁負其子而至矣焉用稼此一段前輩論已詳盡大意道樊遲所見甚卑淺意間道人君偃然在上不耕而食不蠶而衣則吾心有所不安百姓將有所不服欲得君民並耕出入阡陌與百姓同其勞苦庶幾享之而無愧此亦可謂慮事甚密矣其如所見太卑若使天下之民敬服其上莫敢不用情如子弟力耕以供父母則天下之農皆願耕於其野矣耕稼之事自是老圃之職何足以纍君子之心禮記曰后稷天下之為烈也豈一手一足哉為君子者正患無禮無義無信斯民外服事其上而中實欺之則一旦渙然解散却有可慮之理若使禮義修明信服民心享天下之備奉正是當然耳子曰誦詩三百授之以政不達使于四方不能專對雖多亦奚以為此一段是聖人教人讀書法書不在多誦正乃謂有得耳所謂有得者非謂有得於經也正是因經有得於心耳夫誦詩可以從政出使是豈政事言語盡在詩乎亦是感發吾心耳古人多先學詩學者讀詩最是識人情物理胸中真有所興起不至於滯礙不通自然出而可用子曰其身正不令而行其身不正雖令不從其身正其極至於篤恭而天下平不勉而敬不言而信其身不正其極至於用刑而不勝况出令乎管仲下令如流水之原此霸者功用也子曰魯衛之政兄弟也按史記夫子自楚反衛當魯哀公七年衛出公五年也孔子曰魯衛之政兄弟是言為哀公出公發也魯嘗逐君衛方爭國君臣父子之間若此亦無以大相過矣聖人之言及此蓋亦有所感嘆云爾雖然夫子嘗曰齊一變至於魯魯一變至於道則魯之風俗幾於道矣聖人之言及此何也蓋人之受病雖同而元氣之厚薄繫其所稟受元氣之厚者受病雖深當易愈耳昔者仲孫湫省難於魯正當慶父子般之亂可謂禮義滅絶甚矣仲孫湫歸言於齊侯曰魯秉周禮未可取也謂君臣篡奪之際為秉周禮之國蓋必有見於政事之外矣此夫子魯一變至於道之意子謂衛公子荆善居室始有曰苟合矣少有曰苟完矣富有曰苟美矣左氏列公子荆與史鰌蘧伯玉同稱君子則其為人可知矣人之不善居室有二其一曰貪不知足其二曰驕而易盈公子荆則異於是曰合曰完曰美此之謂知足曰苟此之謂不盈夫富而不驕者鮮謂其易盈也富者怨之府謂其不知足也人能知此二者可以為保家之主矣子適衛冉有僕子曰庶矣哉冉有曰既庶矣又何加焉曰富之曰既富矣又何加焉曰教之國患於無民故户口蕃盛者為治之基也後世之君括户以求民為賦役地也聖人欲富民後人欲富國其事正戾故休養生息者所以庶之也勸課農桑者所以富之也申明禮義者所以教之也不如是不足以為人上子曰苟有用我者期月而已可也三年有成子曰善人為邦百年亦可以勝殘去殺矣誠哉是言也子曰如有王者必世而後仁此聖人感嘆憂天下至深切之意也聖人用功雖曰綏之斯來動之斯和然亦是年歲間方得大體齊整若欲事事物物無纎毫未盡處為王道之大成亦須是積習之功如化工生物發育條暢在旬浹之間亦須厯夏秋方能成實善人為邦譬如平和之藥無速化之功積久藥力既行則宿疾自消若夫舉一世之民躋之仁夀之域使昆蟲草木咸歸於仁此非日夜漸漬滲漉之功未易至此譬如天地之間甘露醴泉竒草異木非至和之氣磅礡鬱結何以生此子曰苟正其身矣於從政乎何有不能正其身如正人何為政甚易只須正巳便是正人為政甚難不先正人却先正己政者正也不正不足以謂之政冉子退朝子曰何宴也對曰有政子曰其事也如有政雖不吾以吾其與聞之此一段前輩論得極切當大意以為夫子此語不是論政事小大意專在季氏也昔夫子正取假之名於季氏蓋君臣禮廢已久諛諂成俗雖君子在習俗中浸淫不覺語言亦不識輕重如冉子有政之類是也蓋冉有不曽仕於公朝今之退朝者是退季氏之朝也謂季氏家事為政是當時習俗之辭不以為怪也聖人不欲直言其非為之隱其辭以警悟冉有之意曰往往今日所議者事也若是政關國家利害雖不吾用吾亦須見說隱然國家之義行於其間使冉有感悟聖人之言他日旅泰山伐顓㬰之事皆有以處矣此聖人之微意也定公問一言而可以興邦有諸孔子對曰言不可以若是其幾也人之言曰為君難為臣不易如知為君之難也不幾乎一言而興邦乎曰一言而喪邦有諸孔子對曰言不可以若是其幾也人之言曰豫無樂乎為君唯其言而莫豫違也如其善而莫之違也不亦善乎如不善而莫之違也不幾乎一言而喪邦乎一言可以興邦者謂人君出一言之善便可以興邦如宋景熒惑退之類是也聖人以為一言之發不可若此然而出言之善惡其幾微之際廢興所關甚可畏也蓋一言之善惡未便可以興喪然自此一言而推之前面大段利害興廢之原蓋幾於此幾之為言微也古人之所甚戒謂其隱然而實彰也且如人之言曰為君難此一語未便可興邦然才知為君之難事事不敢輕易邦有可興之理若只說道要人順己此說既出拒人於千里之外如隋煬帝所謂朕性不喜人諌邦豈無可喪之理哉葉公問政子曰近者悅逺者來按家語子貢問於孔子曰昔者齊景公問政於夫子子曰政在節財魯君問政於夫子子曰政在諭臣葉公問政於夫子子曰政在悅近而來逺詩曰亂離瘼矣奚其適歸此傷離散以為亂者也蓋荆之地廣而都狹都狹則近者離散地廣則徒務逺略夫國內空虛而四封之地廣則楚之為政可知矣故夫子答之以近悅而逺自來之道子夏為莒父宰問政子曰無欲速無見小利欲速則不達見小利則大事不成凡事不要速成事若欲速必不免苟簡滅裂前面便行不得又不要求小小近效事若欲近效必不免經營目前真切大事都無暇及古人舉事為是綢繆委曲者非惡其速也惡其不行也見小利不顧者非惡其利也惡其為害也此患不特為政人人有此病學者當味此葉公語孔子曰吾黨有直躬者其父攘羊而子證之孔子曰吾黨之直者異於是父為子隱子為父隱直在其中矣夫理直為直理曲為曲此最易曉而葉公之言及此可謂天下之大愚矣此一事證父者不足責葉公大可責也韓退之以為刲股以救其父在有司尤當誅之以為傷風敗俗若證父攘羊有司當殺無赦今葉公專楚國之政而持論及此則楚國之風俗可知矣嗚呼此固申韓刑名之所由使乎滅絶天倫而一聽於法天下之不亡者特幸爾古之聖人其法制也為是議親之辟非枉法以自私是乃所以行法也蓋立法不問親疏至於掣肘不可行則法有時而廢委曲通人情以與天下議之則法行而民服矣樊遲問仁子曰居處恭執事敬與人忠雖之夷狄不可棄也明道先生以為徹上徹下語觀此語與出門如見大賔使民如承大祭己所不欲勿施於人相似此三語學者時暫亦有此心但不常存耳當尊長之前亦須恭為君父執事亦須敬與親故亦須忠才到可以鹵莽處有時亦不免自恕雖之夷狄不可棄也便有戒慎乎其所不覩恐懼乎其所不聞之意夫子以為言忠信行篤敬雖蠻貊之邦可行居處恭執事敬雖之夷狄不可棄也以此知天下之理有人心者則一而已矣子貢問曰何如斯可謂之士矣子曰行已有耻使於四方不辱君命可謂士矣曰敢問其次曰宗族稱孝焉鄉黨稱弟焉曰敢問其次曰言必信行必果硜硜然小人哉抑亦可以為次矣曰今之從政者何如子曰噫斗筲之人何足算也大抵聖人教人皆是因人之才成就之史記載子貢一出存魯亂齊破吳强晉而霸越此事固不可信然以辨聞恐亦未免有權以濟事處如史記所載雖曰足以存魯其實亦非士君子之事所謂不辱君命者承命而行有死無二而已若曰反覆變詐此蘇張之事是行已而無耻也可以為士乎夫士至於行已有耻使於四方不辱君命可謂有用於國若夫退修於家宗族稱孝鄉黨稱弟此亦可謂純篤退修自潔之士至於苦節自守介而不通抑亦可謂一節之士矣今之從政者何如前輩謂居其邑不非其大夫故夫子自謂斗筲之人辟而不言此意故好竊意子貢所問今之從政不是問當今大夫前面問士而後面問從政是問今士人中亦有去從政者不知如何聖人以為斗筲之人謂士之從政者是斗筲之人所謂為貧而仕急升斗之祿如乘田委吏之類耳何足以數於從政之列所謂噫者嘆士之不見用於時而今之從政者類非士也子曰不得中行而與之必也狂狷乎狂者進取狷者有所不為也所以不得中行而與者正是人多狂狷也猶中庸所謂道之不明也我知之矣賢者過之不肖者不及也然不可以其不中而遂棄之不得中行而與必須取狂狷可也易曰中行獨復以從道也若中行者自可以復不待引而歸於中也惟中也養不中故狂狷之士思得聖人而為之依歸蓋氣質之偏皆可勉而為善惟陰柔模糊無所指名者天下之大姦也此聖人所以惡於鄉原也子曰南人有言曰人而無恆不可以作巫醫善夫不恆其德或承之羞子曰不占而已矣人而無常不特不可為善止他事亦做不得其曰不可作巫醫者舉有利害者言也夫子曰亡而為有虛而為盈約而為泰難乎有常矣人而至此其身且不知所在何以為人巫醫雖賤技然死生禍福與人相關若使無常之人為之其害人多矣不恆其德或承之羞連下文如唐棣之華偏其反而子曰未之思也相類大抵易之書以占而後見吉凶若不常其德其羞辱必至不待占卜已無可說矣如左傳所謂在周易師之臨是未嘗占而言吉凶亦以其事而知之也故曰善易者不占子曰君子和而不同小人同而不和君子忘已故和而不同小人有己故同而不和論到極底君子不同有同之理平居議事不為苟同他日患難不相背負者必今日不苟同之人也小人比昵為一他日有利害便相背故今日之立異者即前日苟同之人其間固有相視如仇讎者何望其同乎子貢問曰鄉人皆好之何如子曰未可也鄉人皆惡之何如子曰未可也不如鄉人之善者好之其不善者惡之此一段是論觀人之法非學者自修之辭也鄉人皆好之則其為人必和易同俗鄉人皆惡之則其為人必狷介自髙然要未見他親切善惡若鄉人之善者好之不善者惡之則善惡分明可知矣故君子自修所至而人化之在彼無惡在此無射庶幾夙夜以永終譽難以好惡言也子曰君子易事而難說也說之不以道不說也及其使人也器之小人難事而易說也說之雖不以道說也及其使人也求備焉前輩有言人雖甚愚責人必明人雖甚明恕己必昏小人但知有己不復知有人若君子則能通彼己蓋君子律已甚嚴一言笑不可妄得似若難事若使人却知人長短小人待己甚薄事事可以取悅其意似若易事若使人都不通人情事事責辦少不如意則譴責隨之蓋忠厚與刻薄之異也觀聖人此言則君子之腹心小人之情狀盡在此子曰君子泰而不驕小人驕而不泰泰則處己閒暇不汲汲於奉人驕則對人傲慢自己却不閒暇泰者無求驕者有挾泰者甚安驕者甚殆子曰剛毅木訥近仁來解以為剛毅木訥非有知覺者不能此其所以違仁不逺大是體貼得仁非說書之法也此其四字只是資質好篤實無僞耳何與於知覺巧言令色其質薄剛毅木訥其質厚子路問曰何如斯可謂之士矣子曰切切偲偲怡怡如也可謂士矣朋友切切偲偲兄弟怡怡聖人大是教得人親切說切切偲偲怡怡如也又恐子路混為一處故申言之曰朋友切切偲偲兄弟怡怡來解以為子路行行其於朋友兄弟不能無失却不是子路平生忍事不得只是好面質人觀其在夫子前屢曾如此朋友相切磋固是美事然亦須識合委曲處方得子曰善人教民七年亦可以即戎矣善人疑若不能即戎然積其教民之功使民歡欣恩愛知有君父雖赴水火可也况於即戎乎夫民讓事樂和愛親哀喪而後可用當其教民豈曰即戎積之既久民愛其上何事不可為哉子曰以不教民戰是謂棄之此一段東坡說得已是春秋書以字極有工鄭棄其師與此棄同憲問第十四憲問耻子曰邦有道榖邦無道榖耻也夫子之門原憲最貧蓋耻仕於亂世也夫子懼其以仕為耻故告之以此邦有道貧且賤焉是亦耻也觀子貢與原憲論貧病事則憲有得於夫子之言矣克伐怨欲不行焉可以為仁矣子曰可以為難矣仁則吾不知也勝已之私克之美也忮克忌忍克之害也四者不行猶未絶其本謂之用力則可謂之仁則未也夫克伐怨欲不行猶有以用其力意必固我既絶無所用吾力矣故曰克已復禮為仁雖克已而未至於復禮未可以為仁也子曰士而懷居不足以為士矣士而懷居百事不成已非士人矣齷齪淺陋苟且委靡皆懷居之故也子曰邦有道危言危行邦無道危行言孫聖人以言孫為逺害之道乎曰非也天下之事殺其身有益於國君子為之若無益於國而輕用其身是淺丈夫而已矣危行言孫為不仕者言也子曰有德者必有言有言者不必有德仁者必有勇勇者不必有仁德與言仁與勇自是兩事緣中心純實發見於外自然相應德人之言可愛可敬真是有和氣襲人之意仁人之勇從容守義不急不迫自然有不可犯之威此是必然無可疑之理蓋不如是則非德也非仁也南宫適問於孔子曰羿善射奡蕩舟俱不得其死然禹稷躬稼而有天下夫子不答南宫適出子曰君子哉若人尚德哉若人擬人不以其倫此聖人所以不答也君子哉若人尚德哉若人其言微而婉取瑟而歌之意也子曰君子而不仁者有矣夫未有小人而仁者也君子安有不仁之理邂逅誤見其意以善為之而或陷於不仁者有之若小人用心全别仁從何而有譬如種稻却時有荑稗若種荑稗雖欲一粒粟不可得也子曰愛之能勿勞乎忠焉能勿誨乎勞字當從平聲來解以為勞勉之勞非是既謂之愛須勞他不然則非以為愛也子曰為命禆諶草創之世叔討論之行人子羽修飾之東里子産潤色之夫子曰我於辭命則不能也此亦是難事春秋時用此為國子産所以能相鄭者辭命之功也然當時亦非子産一人之力同時諸公皆有助焉聖人喜鄭之多賢若曰欲為辭命使禆諶草創世叔討論子羽修飾子産潤色必可觀者矣合衆長而泛言之非專言鄭事也或問子産子曰惠人也問子西曰彼哉彼哉問管仲曰人也奪伯氏駢邑三百飯疏食沒齒無怨言前輩嘗說春秋有三子西此所問者是楚子西何以言之謂其所問者皆執政也楚子西何足齒於聖人之門聖人不欲明言其非彼哉彼哉之辭謂所問者何子西也管仲是一時人物與子産功用全别然子産惠人却有君子意思子曰貧而無怨難富而無驕易貧而無怨是切於身已一若忍受得與外面事難易全不同故爵祿可辭而白刃難蹈子曰孟公綽為趙魏老則優不可以為滕薛大夫雍容風雅與理繁治劇之才不同二者不可偏廢為人上者審擇其人才而用之耳用違其才則人才無一可用用稱其才人才無一不可用人多言古時人才多不知古人善用人才耳子路問成人子曰若臧武仲之智公綽之不欲卞莊子之勇冉求之藝文之以禮樂亦可以為成人矣曰今之成人者何必然見利思義見危授命久要不忘平生之言亦可以謂成人矣合此四人所長有才智而淡然無欲君子之可用者也况文之以禮樂則學問益可觀矣若此可以為成人矣下面曰字是子路說非夫子再言也蓋子路平日於聖人之前多是要任意自說所謂見利思義見危授命久要不忘平生之言此皆子路所長平生見處在此故以為僅足耳子問公叔文子於公明賈曰信乎夫子不言不笑不取乎公明賈曰以告者過也夫子時然後言人不厭其言樂然後笑人不厭其笑義然後取人不厭其取子曰其然豈其然乎其然豈其然乎說者以為此夫子不許公叔文子之辭非也夫子初疑或人之非故以問公明賈公明賈之答與聖人意合故聖人喜之曰元來如此豈是如此耶上一句其然說公明賈之言下一句其然說或人以告之非也子曰臧武仲以防求為後於魯雖曰不要君吾不信也晉趙鞅入于晉陽以叛君子曰以地正國謂之叛焉可也據地以求後安得謂之不要君哉子曰晉文公譎而不正齊桓公正而不譎齊威晉文之事惟讀春秋究見二公本末方知聖人之言譎正為二公圖伯言也齊威用二三十年之功晉文公乃成功於二三年之間譎正之辨也召陵正城濮譎子路曰桓公殺公子糾召忽死之管仲不死曰未仁乎子曰桓公九合諸侯不以兵車管仲之力也如其仁如其仁說春秋者曰信其信仁其仁衣裳之㑹十有一未嘗有㰱血之盟也信厚也兵車之㑹四未嘗有大戰也愛民也所謂仁其仁者即如其仁是也如其所成就是亦管仲之仁也大抵有功於生民者皆可以言仁子貢曰管仲非仁者與桓公殺公子糾不能死又相之子曰管仲相桓公霸諸侯一匡天下民到於今受其賜微管仲吾其被髮左衽矣豈若匹夫匹婦之為諒也自經於溝瀆而莫之知也公伐齊納糾書糾不書子不當立也故古人以子糾為威公之弟若大義不當立而死之是狥私恩也匹夫匹婦狥一飯之恩殺身以為報者有之矣非義也公叔文子之臣大夫僎與文子同升諸公子聞之曰可以為文矣自其大者言之純亦不已與天同功自其細者言之卑躬損已孜孜學問皆自是而可進矣子言衛靈公之無道也康子曰夫如是奚而不喪孔子曰仲叔圉治賔客祝鮀治宗廟王孫賈治軍旅夫如是奚其喪齊威公內行不修有管仲可以霸衛靈公無道得人亦可以不亡然則修身齊家與治國平天下有異乎曰霸於其身者不能禁亂於既死國雖不喪而蒯瞶與輒之事國幾亡矣此君子之所甚畏也子曰其言之不怍則為之也難言至於不怍其內功深矣此其所以難也陳成子弒簡公孔子沐浴而朝告於哀公曰陳恆弒其君請討之公曰告夫三子孔子曰以吾從大夫之後不敢不告也君曰告夫三子者之三子告不可孔子曰以吾從大夫之後不敢不告也非天子不言討若哀公從夫子之言必且奉王命以問齊罪如􅏷侯承王命徂征是也子路問事君子曰勿欺也而犯之若谷永之諫所謂欺其君而犯之也子路勇於必為决不至於欺君然已有所不知而强其君之必從是亦欺也子曰君子上達小人下達同此一事也君子向上儘通徹小人向下亦通徹子曰古之學者為己今之學者為人來解以治國平天下為為人非也何幸得人要治國平天下蓋為人之學不如此只是要人說好故有人則作無人則輟耳蘧伯玉使人於孔子孔子與之坐而問焉曰夫子何為對曰夫子欲寡其過而未能也使者出子曰使乎使乎應對得極好不惟蘧伯玉能進德使人亦能以進德矣或曰蘧伯玉欲寡過而使人於夫子故夫子不與之曰此非使人之所與知也其說鑿子曰君子思不出其位來解說位亦心但不必如此說只是承上文不在其位之位行無越思如農之有畔也既不失職亦不越職則其官治矣子曰君子耻其言而過其行來解以為欲人之過行者非也耻言之過於行耳所謂言浮於行者是也故曰古者言之不出耻躬之不逮也子曰君子道者三我無能焉仁者不憂知者不惑勇者不懼子貢曰夫子自道也中庸曰知仁勇三者天下之達德也由天下之所同得故曰天下之達德由君子之所能行故曰君子道者三雖然所以行之者一也故子貢曰夫子自道也一曰夫子自道若此耳彼學者之論夫子不然也子貢方人子曰賜也賢乎哉夫我則不暇此聖人以其身為子貢訓也若一日三省吾身者必無工夫方人矣為善惟恐其不足救過惟恐其不給雖聖人猶以為不寢不食也何暇論人哉夫子嘗曰賜不幸言而中夫以言中為不幸則賜之賢其賜之不幸也或曰夫我則不暇指子貢言也但知方人而自己則不暇問其說亦新子曰不患人之不已知患其不能也患不能則進矣此君子之所憂也子曰不逆詐不億不信抑亦先覺者是賢乎人之所以有逆詐億不信之心者欲察物之情不使為人所欺以此為賢耳夫以不誠待人處心已薄於人無損於已有虧謂之賢可乎微生畝謂孔子曰丘何為是栖栖者與無乃為佞乎孔子曰非敢為佞也疾固也夫子厯聘列國頗似栖栖當時辟世之士皆以聖人為非夫佞以求用非也固守所見無意於世執其一偏自以為是其害道亦多矣夫可以仕則仕可以止則止非固也子曰驥不稱其力稱其德也今稱良馬者多言其能行故有言千里馬者不知此特力耳良馬之所以可稱者却不在此當論其德可也溫良淳和急難不相離有君子之義焉或曰以德報怨何如子曰何以報德以直報怨以德報德報怨不可有心報德雖有心可也子曰莫我知也夫子貢曰何為其莫知子也子曰不怨天不尤人下學而上達知我者其天乎下學而上達猶所謂升聞於上也故曰知我者其天乎公伯寮訴子路於季孫子服景伯以告曰夫子固有惑志於公伯寮吾力猶能肆諸市朝子曰道之將行也與命也道之將廢也與命也公伯寮其如命何夫子以顏淵死為天喪豫子路死為天祝豫蓋門人弟子得行道者是亦斯道廢興之所係也事關天命非人力所能為也子曰賢者辟世其次辟地其次辟色其次辟言世亂而遁聖人亦以為賢若長沮桀溺之徒是也但比之聖人不可同日而語耳辟地若違之一邦是也形於色而後去則已非矣况形於言乎子曰作者七人矣來解兩說皆通然作者兩字恐非隱者所能當堯舜禹湯文武周公是也土焉者無證故序書斷自唐虞子路宿於石門晨門曰奚自子路曰自孔氏曰是知其不可而為之者與在晨門則知其不可在聖人則但見其尚可為耳故曰我則異於是無可無不可子擊磬於衛有荷蕢而過孔氏之門者曰有心哉擊磬乎既而曰鄙哉硜硜乎莫已知也斯巳而已矣深則厲淺則揭子曰果哉末之難矣末之難矣說者甚多蓋荷蕢之言傷於太急斷然便為此辭似少商量故曰果哉末之難矣聖人恨不得與之往反共論也子張曰書云髙宗諒隂三年不言何謂也子曰何必髙宗古之人皆然君薨百官總已以聽於冢宰三年觀子張此問知當時自天子至於諸侯不行三年之喪久矣觀左傳魯昭公有三年之喪而國不廢搜孟子載滕文公定為三年之喪百官父兄皆不欲可概見矣三年不言古之人君皆然髙宗因恭默思道之中夢帝賚豫良弼作說命三篇故髙宗不言之事得載於後世耳子曰上好禮則民易使也君子學道則愛人小人學道則易使也蓋百姓極易使上無禮下無學惟見其難耳上好禮則民莫敢不敬夫如是使之赴水火可也子路問君子子曰修已以敬曰如斯而已乎曰修己以安人曰如斯而已乎曰修己以安百姓修已以安百姓堯舜其猶病諸此三事無淺深但聖人因子路之言太輕故推廣言之耳敬便能安人安人便是安百姓其本原功用如此原壤夷俟子曰幼而不遜弟長而無述焉老而不死是為賊以杖叩其脛前輩謂原壤有西晉之風登木之歌是亦阮籍飲酒食肉之意也聖人懼其禍之將至此也故夷俟一事責之甚嚴以杖叩其脛因其夷俟而數其罪三也門人記之猶指其掌之義闕黨童子將命或問之曰益者歟子曰吾見其居於位也見其與先生並行也非求益者也欲速成者也若有願學之心雖難言如互鄉亦可教若有自足之意雖將命如闕黨亦不足以進於學矣人只觀其志向更不當問其能否能者易敗而有志者不可禦也衛靈公第十五衛靈公問陳於孔子孔子對曰爼豆之事則嘗聞之矣軍旅之事未之學也明日遂行按左傳孔文子之照攻大叔也訪於仲尼仲尼曰簠簋之事則嘗學之矣甲兵之事未之聞也退命駕而行文子遽止之將止魯人以幣召之乃歸與此事頗相類不知是二事復是一事也孔子在衛有際可之仕蓋亦有意在衛及其問陳全體不識聖人無可說者故明日遂行所謂可以止則止可以速則速也在陳絶糧從者病莫能興子路愠見曰君子亦有窮乎子曰君子固窮小人窮斯濫矣子路平生有力能不耻於衣敝縕𫀆而不能不慍見於絶糧之際學問不足也子曰賜也女以豫為多學而識之者歟對曰然非與曰非也豫一以貫之聖人不貴於多學歟曰博學詳說聖賢之事也然必有以貫之則博而有要人但見聖人之博學多識而不知聖人之有要也隱然一貫之理默通於博學之中也此其博學也與人異矣子曰由知德者鮮矣此一句不是說子路只是告子路耳由字當如由誨汝知之乎之由㸃作一句子曰中庸之為德其至矣乎民鮮能久矣豈惟鮮能久只知者亦鮮子曰無為而治者其舜也與夫何為哉恭巳正南面而已矣無為而治舜之德也其實人君治天下本亦無可為者恭巳正南面初無一事可為也惟舜能安於無為而已矣子張問行子曰言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉立則見其參於前也在輿則見其倚於衡也夫然後行子張書諸紳子張問行與問達一般只是向外尋求要行要達却不曾反己聖人使求之言行若言行誠實看置之何地皆可行若不誠實不行於妻子况州里乎然是行也亦須積得純熟自見得親切方能有行求功於旦暮而歸過於忠信篤敬之無益則非矣子曰直哉史魚邦有道如矢邦無道如矢君子哉蘧伯玉邦有道則仕邦無道則可卷而懷之來解史魚蘧伯玉於夫子亦太過矣蘧伯玉只是善卷舒尋常不為人所忌故邦無道可以卷而懷之史魚尸諫一事至死亦只是此一直是亦可謂君子之直矣子曰可與言而不與之言失人不可與言而與之言失言知者不失人亦不失言多言不如靜默之功然當其人而不言其失所亦多矣所貴於知者謂其不失機也失機而悔後無及矣子貢問為仁子曰工欲善其事必先利其器居是邦也事其大夫之賢者友其士之仁者問仁與問為仁不同為仁則必資於友朋之助如工人之利器然至於拙工則又非器之所及也顏淵問為邦子曰行夏之時乘殷之輅服周之冕樂則韶舞放鄭聲逺佞人鄭聲淫佞人殆為邦固自有道聖人不言其道而直言夫治定功成制禮作樂為萬世之章程此其待顏子可知矣鄭聲佞人特去其害治者而已矣子曰人無逺慮必有近憂人之逺慮頗似迂闊然而無逺慮者必有近憂則所謂逺慮者乃親切至近之慮也子曰巳矣乎吾未見好德如好色者也此兩語聖人為衛靈公南子設也然而世之通病不逃於聖人此兩言如好好色如惡惡臭指人情至切緊者言也內自省則病稍瘳矣子曰臧文仲其竊位者與知桞下惠之賢而不與立也不知其賢而不用猶可說也知人之賢而惡其與己並也是不以國家百姓為念者也其亦不仁甚矣非所當有而有之謂竊子曰躬自厚而薄責於人則逺怨矣若躬自厚而不責於人則無怨矣不但逺也大抵自利者多怨求人者亦多怨能自怨艾則於人無怨矣子曰不曰如之何如之何者吾末如之何也已矣不曰如之何如之何當作一句人亦須是遇事三思與人仔細商量有臨事而懼好謀而成之意然後可若不能如此率情任意雖聖人亦無如之何也己子曰羣居終日言不及義好行小慧難矣哉此為羣居設也無切磋之益而有好發人隱伏之心則其勢不可以相安是真難以共處也子曰君子義以為質禮以行之孫以出之信以成之君子哉聖人常言主忠信今乃曰義以為質信以成之來解以為次第先後非也此一段不是論先後之序只是說為君子者當如此一事少不得孟子論仁義禮知不說信蓋人無信一事做不成猶五行之無土也故曰義以為質義為質了須是有禮以行之有孫以出之有信以成之方得為君子不是說道禮行孫出了方以信成之也子曰君子病無能焉不病人之不己知也患不知人求為可知病無能都是自己上用力若知患知求知病則其用功事深矣非為他人設也子曰君子疾沒世而名不稱焉與病無能同人之有疾疢者必思所以去之此其真情也然則君子亦求名與曰名非可以求而得自修而名隨之病其名不稱則知所以自修矣子曰君子求諸己小人求諸人然則聖人取諸人以為善非與曰非此之謂也君子每事求己惟見己之未至故能自反小人每事求人惟見人之莫我與也故常多怨求己者求則得之求人者求則失之求己者常見己之過求人者常見人之過子曰君子矜而不爭羣而不黨矜似異羣似同矜而不爭則雖異而同羣而不黨則雖同而異小人務自矜持便有爭勝之意相與羣居便有合黨之患子曰君子不以言舉人不以人廢言此君子聽言之法以言舉人則失之輕以人廢言則失之苛但當因言而審察之耳言雖是而人則非亦不舉人人雖非而言則是亦不廢言惟其是而已矣子貢問曰有一言可以終身行之者乎子曰其恕乎己所不欲勿施於人天下之事惟通彼己者能不損己以益人此理可以長久行之而不變若未免以人己二其心則必有齟齬而不可行者非特人病之揆之吾心必有不可行者矣事只是心安者便行得長逺此一段可以兩字著力子曰吾之於人也誰毁誰譽如有所譽者其有所試矣斯民也三代之所以直道而行也毁人是不美事聖人固無之然有心於譽人亦非聖人之公也斯民在三代之時所以能直道而行者只是順行此理詩曰周道如砥其直如矢君子所履小人所視蓋三代之時君子與小人同此一道也此一段所以兩字著力子曰吾猶及史之闕文也有馬者借人乘之今亡矣夫前輩常說有馬者借人乘之此乃闕文也不言何人之馬借何人乘之蓋相傳妄自增加也觀聖人作春秋可見矣子曰巧言亂德小不忍則亂大謀不是似是而非如惡鄭聲亂雅樂之亂來說未善也此只說自己多言敗德况巧言乎故巧言能亂人德小不忍起而便為之能亂大謀亂則百事不成矣子曰衆惡之必察焉衆好之必察焉人情多於參差處致察至於衆人所雷同處亦不復加意君子却不當如此於衆人所不察之中當致密察之功蓋非特觀此一段必字著意子曰人能𢎞道非道𢎞人道自人出非由外至者也蓋人能充擴此道使天下共由之此人之能𢎞道也若人者萬善俱備無有虧遺不足之處道豈能𢎞人哉此一段能字著意子曰過而不改是謂過矣過不能改方是真過若不幸而過過而能改非過也子曰吾嘗終日不食終夜不寢以思無益不如學也來解不是學與思相因闕一不可然一面苦思不學則非徒無益而又害之雖聖人亦不能徒思也學在前思在後故博學審問然後慎思論語亦曰博學而篤志切問而近思先學後思思方有益子曰君子謀道不謀食耕也餒在其中矣學也祿在其中矣君子憂道不憂貧君子謀道不謀食蓋食非人之所能謀也且如耕穫以謀食可謀得所求矣然歲安能常豐未免餒在其中謀道者固不謀食然學亦有祿在其中未可謂之不得食也蓋道者君子之所當憂而貧者非君子之所當憂也富不可求貧不可去雖憂無益也聖人教學者親切之言及此可謂詳盡矣子曰知及之仁不能守之雖得之必失之知及之仁能守之不莊以涖之則民不敬知及之仁能守之莊以涖之動之不以禮未善也來說不是却太深了又說居官臨民亦太小了有國有天下者當識此理智慮周防得到固足以來之然强把持不住須是守以仁秦隋之君是知及之也七制仁義公恕統天下是能以仁守之也至於下兩節又非七制所能及也使民瞻其顏色望其容貌而不敢生慢易焉此臨之以莊之功也雖然猶未也動之以禮使民由於禮而不知所謂動之斯和則盡善矣此三代聖王之事也子曰君子不可小知而可大受也小人不可大受而可小知也此一段在可不可上著力若不可小知則小知是不好底事與不可以為滕薛大夫事不同蓋大受是受人大底事如託國託孤事關利害之類若小小私昵真是不管强教他與聞其事不得小人反此小小私昵亦能出力為人才到利害便相背負蓋謂其不可大受也子曰民之於仁也甚於水火水火吾見蹈而死者矣未見蹈仁而死者也孟子曰民非水火不生活故水火人之所恃以為生也民之於仁也甚於水火若夫子所謂自古皆有死民無信不立者是也民之於仁急切如此然人因蹈水火而死者有之矣未見蹈仁而死者也所謂無殺身以成仁者也此兩句人多說不同或云水火有蹈死底道理仁無蹈而死者此亦易曉不待聖人說又有人說水火蹈之終其身未有蹈仁終身至死而後己者也此亦病人人皆是終身蹈水火聖人却不應說吾見兩字子曰當仁不讓於師當仁便向前做雖師不讓也其勇於必為可知矣子曰君子貞而不諒來解以諒為信信與諒不同匹夫匹婦之為諒蓋不顧義理之是非但守其言之必信此之謂諒其於正大之義相去霄壤矣子曰事君敬其事而後其食古者人君不輕以祿與人所謂位定然後祿之又曰以功詔祿者是也君子亦不敢輕受其君之祿如孟子所謂退而有去志不欲變故不受也事君者量事而後食務先敬其事度在已無愧事而後敢受祿於君子曰有教無類聖人只有教人之心無分别人之心才有教則人人皆可學却無彼此今人多言某非士類不可教自恨教者無以教人耳苟有教何類之有只患月不出不患不遍照也只患雨不降不患其不遍澤也子曰道不同不相為謀不相為謀則其背戾而不合所謂左右背劔者也君子於此亦聽其自耳非可强合也東坡曰彼且不吾信如吾之不彼信也子曰辭達而已矣君子無意於為辭求以達其意而已矣辭達則止不求工也然而見理不明者其辭必不達師冕見及階子曰階也及席子曰席也皆坐子告之曰某在斯某在斯師冕出子張問曰與師言之道與子曰然固相師之道也來解以為誠亦不必如此實說只是道理合如此瞽之無相倀倀然無所之故瞽必有相今既來見便合與他說所謂見瞽者必作過之必趨亦只是道理當然季氏第十六季氏將伐顓㬰冉有季路見於孔子曰季氏將有事於顓㬰孔子曰求無乃爾是過與夫顓臾昔者先王以為東蒙主且在邦域之中矣是社稷之臣也何以伐為冉有曰夫子欲之吾二臣者皆不欲也孔子曰求周任有言曰陳力就列不能者止危而不持顛而不扶則將焉用彼相矣且爾言過矣虎兕出於柙龜玉毁於櫝中是誰之過與冉有曰今夫顓㬰固而近於費今不取後世必為子孫憂孔子曰求君子疾夫舍曰欲之而必為之辭丘也聞有國有家者不患寡而患不均不患貧而患不安蓋均無貧和無寡安無傾夫如是故逺人不服則修文德以來之既來之則安之今由與求也相夫子逺人不服而不能來也邦分崩離析而不能守也而謀動干戈於邦內吾恐季孫之憂不在顓臾而在蕭墻之內也顓臾任宿須句皆風姓也實司大皡與有濟之祀僖公之母成風故僖公嘗封須句則風姓之親魯親之舊矣顓㬰之伐季孫蔑公室也既說近費便是要廣費地此其真情也聖人却不甚責子路蓋輔成季氏之惡者大抵多是冉有故季孫欲以田賦使冉有訪諸仲尼又曰季氏富於周公而求也為之聚斂而附益之聖人逆知三桓之子孫微矣故曰季孫之憂在蕭墻之內也孔子曰天下有道則禮樂征伐自天子出天下無道則禮樂征伐自諸侯出自諸侯出蓋十世希不失矣自大夫出五世希不失矣陪臣執國命三世希不失矣天下有道則政不在大夫天下有道則庶人不議天下有道則禮樂征伐不自諸侯出况政在大夫政不在大夫矣况庶人得以議政緣諸侯侵禮樂征伐故大夫竊政大夫竊政故庶人議政上下相承之理也故下之事上卑之事尊乃所以安乎其位也孔子曰祿之去公室五世矣政逮於大夫四世矣故夫三桓之子孫微矣自公子遂殺適立庶而後公室之權去自昭公出居乾侯而季氏之僣極矣聖人當定公之時故曰祿之去公室五世矣政逮於大夫四世矣祿先去公室而後政始逮大夫孔子曰益者三友損者三友友直友諒友多聞益矣友便僻友善柔友便佞損矣取友之道以剛為上而多聞次之若便僻善柔便佞皆非剛者也益如人加長而不自知損如火消膏而人不見益難而損易如薰蕕然十年尚猶有臭孔子曰益者三樂損者三樂樂節禮樂樂道人之善樂多賢友益矣樂驕樂樂佚逰樂宴樂損矣大學曰有所好樂則不得其正然亦觀其正與不正耳有所好樂則念慮不忘於心久而與之俱化其最善者好自謹飭與賢者遊而喜稱道人之善知為善之可慕久久必當有益若怠惰不學好自縱恣久而不改其損大矣驕樂傲也佚遊慢也宴樂安也皆恣情縱欲之病也孔子曰侍於君子有三愆言未及之而言謂之躁言及之而不言謂之隱未見顏色而言謂之瞽此一段讀曲禮即見得少事長者其難如此孔門中如子路之率爾固不可然問焉而不言則不用情亦非事長之義也若夫未見顏色而言則妄人而已矣孔子曰君子有三戒少之時血氣未定戒之在色及其壯也血氣方剛戒之在鬬及其老也血氣既衰戒之在得前輩已謂血氣之善有限學問之善無窮蓋學問不充血氣用事雖有善者亦只是血氣為之况血氣之不善者乎學問之功全在變化氣質血氣隨少長而盛衰此心戒懼一日則好一日君子有三戒不敢自恃如此孔子曰君子有三畏畏天命畏大人畏聖人之言小人不知天命而不畏也狎大人侮聖人之言子曰無欲而好仁無畏而惡不仁者天下一人而已矣故畏者進德之階也人惟無所畏也而後動於惡故小人為不善者必先慢天忽人不有聖賢之論然後得以自便其欲王氏曰天變不足畏人言不足恤祖宗不足法此所謂無忌憚者也孔子曰生而知之者上也學而知之者次也困而學之又其次也困而不學民斯為下矣未嘗學問觸事面墻窮途而反尚可謂學既學而知猶可次於生知之列直至於困頓不學民方為下於此知天下無不可學之人學無不可知之理學者不當自棄君子不當棄人孔子曰君子有九思視思明聽思聰色思溫貌思恭言思忠事思敬疑思問忿思難見得思義古人以視聽言貌思為五事聖人以思分於視聽言貌之中其理相為用也今人何嘗不思但思慮擾擾要緊者不曽思只是邪妄耳內而處已外而接物那一件少思慮得君子念念不忘於善故事事物物皆經思慮思則得之不思則不得也今人所以多誤者只緣鹵莽過了若加思慮無有不當者然而君子之思非擾擾然無所至止也內有所主中扃不惑則事變雖萬殊而此思則一學問之功以思為主聖人言之詳矣所謂不思無思者是又聖人之事也孔子曰見善如不及見不善如探湯吾見其人矣吾聞其語矣隱居以求其志行義以達其道吾聞其語矣未見其人也前輩嘗說見善如不及見不善如探湯是不好事蓋見善則不向前見惡則時一染指焉人類多如此若夫退然自處理㑹自巳事各據其所可行者以自達於聖人之道如此底人己自難得今人只是推善不做嘗試於為惡者爾齊景公有馬千駟死之日民無得而稱焉伯夷叔齊餓於首陽之下民到於今稱之其斯之謂與此一段是連上文齊景公聞夫子君君臣臣之言而知其善聞晏子之言而知禮之可以為人國然卒不能用其言柔弱無立甘心於亂亡豈非所謂見善如不及者乎伯夷叔齊所謂隱居以求志行義以達道乎陳亢問於伯魚曰子亦有異聞乎對曰未也嘗獨立鯉趨而過庭曰學詩乎對曰未也不學詩無以言鯉退而學詩他日又獨立鯉趨而過庭曰學禮乎對曰未也不學禮無以立鯉退而學禮聞斯二者陳亢退而喜曰問一得三聞詩聞禮又聞君子之逺其子也聖人之教子先養其氣質待其可以受教也然後因其質而徐教之不先時而躐等也學詩學禮乃平日為門人言者還以告其子夫子嘗謂伯魚曰人而不為周南召南其猶正墻面而立也此學詩之訓也伯魚之母亡期而猶哭夫子聞之曰嘻甚也伯魚聞之遂不哭此學禮之訓也邦君之妻君稱之曰夫人夫人自稱曰小童邦人稱之曰君夫人稱諸異邦曰寡小君異邦人稱之亦曰君夫人此章是先王之禮弟子附見於此蓋亦嘗聞聖人之言云爾夫人與君得並稱君夫人稱小君此其於國之臣子有君道也所以相內治也如之何其以易為之春秋之時夫人不成其為小君矣君稱之曰夫人夫人自稱曰小童其相敬如此寧復有如春秋夫人之事哉宋左師受妾棄寶馬之賜改命曰君夫人而後受之大臣之稱若此邦人何觀焉聖人安得不嘆息於斯陽貨第十七陽貨欲見孔子孔子不見歸孔子豚孔子時其亡也而往拜之遇諸塗謂孔子曰來豫與爾言曰懷其寶而迷其邦可謂仁乎曰不可好從事而亟失時可謂知乎曰不可日月逝矣歲不我與孔子曰諾吾將仕矣此不是聖人明哲保身乃是聖人從容中道處歸豚之意陽虎設詐行權以屈聖人之從已如此也聖人默折之往來唯諾之間使小人不得以致怨肆毒所謂從容中道者與子曰性相近也習相逺也相近二字至哉聖人之言也渾然天成無所偏倚三字之說廢矣後雖有辨者無所致其詰矣哉子曰唯上知與下愚不移此一章是連上文聖人懼人之不曉也故又再言之惟其習相逺故上智與下愚不移其初只是同行一人向東一人向西便有萬里懸隔終身不相及矣然則為中人者可不審所習哉子之武城聞弦歌之聲夫子莞爾而笑曰割雞焉用牛刀子游對曰昔者偃也聞諸夫子曰君子學道則愛人小人學道則易使也子曰二三子偃之言是也前言戲之爾聞弦歌之聲不是子游弦歌是邑之人弦歌也故子游以學道為對一似今之州縣先教化所在各有書堂弦誦之聲洋洋盈耳夫子欣然有當於其心故喜而戲之耳公山弗擾以費畔召子欲往子路不說曰末之也己何必公山氏之之也子曰夫召我者而豈徒哉如有用我者吾其為東周乎按公山不狃率費人以攻中山仲尼命申句須樂頎下伐之費人北國人追之不狃奔齊如此則是公山不狃之招聖人是有悔畔之意也故聖人欲從而勸教之及其不往則始命樂頎等下伐之夫子時為司冦也若是子路則决然不可往非有磨不磷涅不緇之德則不可往非有綏來動和之功則往亦無益聖人闔闢造化之功子路宜乎驚怪而不曉也子張問仁於孔子孔子曰能行五者於天下為仁矣請問之曰恭寬信敏惠恭則不侮寬則得衆信則民任焉敏則有功惠則足以使人此五者處已甚嚴待人甚恕大抵聖門之論仁分而言之則仁義禮智各為一德合而言之則仁總萬善而為之長凡天下之善皆仁也不必曰此仁便是公彼仁便是覺也克己不必專說己愛人不必專說人未有克已而不愛人未有愛人而不能克己者也佛肸召子欲往子路曰昔者由也聞諸夫子曰親於其身為不善者君子不入也佛肸以中牟畔子之往也如之何曰然有是言也不曰堅乎磨而不磷不曰白乎涅而不緇吾豈匏瓜也哉焉能繫而不食觀夫子者當於見南子欲從公山弗擾及佛肸召處觀之此是聖人大功大用與造化相似處去聖人一間便做不得蓋不如是不足以為聖人親於身為不善君子不入此只是初學自守者便能及此子路可謂不識聖人吾豈匏瓜也哉焉能繫而不食言其不為人所食無用於世也人亦須有用於天下方可以扶立世道乾坤亦只是用若安坐而無所用是亦匏瓜而已矣子曰由女聞六言六蔽矣乎對曰未也居吾語女好仁不好學其蔽也愚好知不好學其蔽也蕩好信不好學其蔽也賊好直不好學其蔽也絞好勇不好學其蔽也亂好剛不好學其蔽也狂來說以仁知六者為質不是此只說好耳仁知信直勇剛此六者最是好底德愚蕩賊絞亂狂此六者最是不好底事只緣不學故雖好仁好信亦只為善何况所好者非善耶大抵人不學問與學而不窮其精微徒知美名之可慕而不究其實其意皆以善為之而不知其非者多矣此則學者之所畏也子曰小子何莫學夫詩詩可以興可以觀可以羣可以怨邇之事父逺之事君多識於鳥獸草木之名人情至美也逺近相取情僞相感則亦有時而不美故聖人必有以通人情使得以自述其情性寫其歡欣之意而嘆其愁思不樂之狀夫是以宣其鬱滯而樂其和美則不肖之心不生矣後之學者豈不當學此通乎詩則明乎人情識乎物理可以感發善心察觀世變可以羣居不亂雖有怨誹而不至於已甚上而君臣父子之間有人情之所難處者皆委曲中道下而鳥獸草木之名與時消息物理變化亦可略見矣學詩之功至此顧不大哉子謂伯魚曰女為周南召南矣乎人而不為周南召南其猶正墻靣而立也與來解以為道不可進猶正墻面而立此說不通道不進如何說正墻面所謂正墻面者謂其無所見也古人學詩增長人見識甚多故古人多因詩以正義理周南召南三百篇之祖亦不必實說人倫之本也為猶治也猶為禮為樂之意子曰禮云禮云玉帛云乎哉樂云樂云鐘鼓云乎哉夫子於論語止言禮不在玉帛樂不在鐘鼓耳至於禮記說禮樂極親切推而至於孝悌之行治心治躬之學無聲之樂無體之禮其深矣哉孟子得之直論其實以為出於事親從兄可謂深切著明矣子曰色厲而內荏譬諸小人其猶穿窬之盜也與孟子嘗論人能充穿窬之心而義不可勝用穿窬與義逺矣毫釐之間相絶如此信乎為學之難君子致謹於精微之際如此也孟子又言士未可以言而言可以言而不言是皆穿窬之類也其分别於義利之際精微而嚴直聖門論學大抵如此聖人以色厲內荏比於穿窬可不畏哉外雖剛强中實歉然是有愧於中也外欺人而內自愧惴惴然惟恐人之知己也是豈非穿窬之類哉子曰鄉原德之賊也此章孟子論之蓋詳矣稂莠苖之賊鄭聲樂之賊謂其同類而近也疑似不明誤天下後世不少此吾夫子之所甚惡而少正卯所以誅也夫子不攻異端而惡鄉原聖人之意微矣原髙也深也子曰道聽而塗說德之棄也學不窮本何以進德道聽塗說猶今諺所謂東畔聽得西畔去說更不究見本末由來便以為是如此雖聖人亦不能教也此之謂自棄子曰鄙夫可與事君也與哉其未得之也患得之既得之患失之苟患失之無所不至矣東坡云李斯憂蒙恬之奪其權則立二世以亡秦盧把憂懷光之數其惡則誤德宗以再亂其心本生於患失其禍乃至於喪邦善哉斯言能推明聖人之意矣其始止是鄙夫其終乃是亂臣賊子爵祿之心重便生出無限事誤國誤家豈其本心哉一念之差而已矣子曰古者民有三疾今也或是之亡也古之狂也肆今之狂也蕩古之矜也廉今之矜也忿戾古之愚也直今之愚也詐而已矣古人雖病處亦好今人連病亦無古人就病處却醫得今人之病不可救矣肆與蕩不同肆是放言髙論蕩則不檢束矣廉是有廉隅如今人言善自矜持是也若忿戾則傲俍已甚氣象全别矣此皆小人自託於美名以掩其欺者也子曰惡紫之奪朱也惡鄭聲之亂雅樂也惡利口之覆邦家者此一段與孟子所說不同孟子是說疑似之亂真也故惡之夫子直言其所以惡之之意耳所謂君子亦有惡是也子曰豫欲無言子貢曰子如不言則小子何述焉子曰天何言哉四時行焉百物生焉天何言哉此見得聖人以天自處聖人嘗曰我欲託之空言不如見之行事之深切著明也使聖人得見諸行事必有造化密移之功不言而化矣退而載諸空言平日與門弟子講論與繫易象作春秋皆言也猶懼天下後世求聖人於言語之末而莫知其本也故又有豫欲無言之嘆子貢異日有不可得聞之說是得聖人之意矣孺悲欲見孔子孔子辭以疾將命者出户取瑟而歌使之聞之夫子闞亡而見陽貨與取瑟而歌使孺悲聞之之事見得聖人待小人之道無絶小人之法而又有感悟小人之機其闔闢造化非學者所及也宰我問三年之喪期已久矣君子三年不為禮禮必壞三年不為樂樂必崩舊穀既沒新穀既升鑽燧改火期可已矣子曰食夫稻衣夫錦於汝安乎曰安汝安則為之夫君子之居喪食㫖不甘聞樂不樂居處不安故不為也今汝安則為之宰我出子曰豫之不仁也子生三年然後免於父母之懷夫三年之喪天下之通喪也豫也有三年之愛於其父母乎甚矣宰豫之不仁也習於世俗之薄而反諸其心尤甚焉自以為禮樂之廢壞重於其親之亡也使豫嘗讀蓼莪之詩必不忍發此語矣十哲之數既入曽子當去宰豫學者無以宰我為聖門之徒汚吾聖人也子曰飽食終日無所用心難矣哉不有博奕者乎為之猶賢乎已博奕之過止在博奕無所用心之過雖滔天可也學者不可使此身逐日無安頓處子路曰君子尚勇乎子曰君子義以為上君子有勇而無義為亂小人有勇而無義為盜知仁勇三者天下之達德也聖人以勇配仁知蓋勇即義也子路見勇而不見義故聖人不言勇而言義夫大而為亂小而為盜皆勇之為禍也君子豈可以尚勇乎此聖人教子路切至如此也齊宣王好勇孟子誘而進之故曰王請無好小舅子路尚勇夫子辭而闢之故曰君子有勇而無義為亂聖賢教人之意深矣子貢曰君子亦有惡乎子曰有惡惡稱人之惡者惡居下流而訕上者惡勇而無禮者惡果敢而窒者曰賜也亦有惡乎惡徼以為知者惡不遜以為勇者惡訐以為直者聖人之所惡者惡其為害於人子貢之所惡者惡其自欺於已其廣狹不同如此聖人之喜怒前輩以為如鑑然妍醜自見無所容心若子貢之惡則見人之過而有忿疾之心矣子曰唯女子與小人為難養也近之則不遜逺之則怨聖人察於人情之際亦微矣上而宦官宫妾下而家人臧獲皆是物也逺之不可近之不可則亦難乎其為養也不求諸家而求諸身得其所以養矣子曰年四十而見惡焉其終也已來解以為年至四十此其不惑之時也說書不當如此四十而不惑此自是夫子當時事如何立定限制便云四十是不惑時夫子四十不惑孟子四十不動心此自是孔孟為學成就如此豈比夫三十壯有室四十强而仕為人人一定之說乎四十而見惡焉猶云四十五十而無聞焉取其大約言也此聖人待人忠厚之意年至四十春秋已髙經歷世變已多猶未免見惡於人此所謂困而不學民斯為下者也嘆息之而已矣微子第十八微子去之箕子為之奴比干諫而死孔子曰殷有三仁焉前輩嘗說商三仁若比干死箕子囚皆無可解說者微子此事最費解說故微子特作一書自說其去之之因蓋二人可諌微子當嫌疑可立之際故不敢說退而存商之祀所謂自靖人自獻於先王三人各行其志無愧於先哲王此其所以為仁也一經夫子之言三人之名遂定不然後世必以微子之去為非矣桞子厚說紂惡未稔而自斃武庚念亂以圖存國無其人誰與興理此固人事之或然者箕子隱忍而不去亦有志於斯此亦說得箕子好桞下惠為士師三黜人曰子未可以去乎曰直道而事人焉往而不三黜枉道而事人何必去父母之邦人皆謂桞下惠和觀直道事人之語桞下惠不和矣不容於人至於三黜其亦不可謂介矣故伯夷非隘桞下惠亦非不恭蓋不如是不足以為聖賢孟子推言其末流之弊耳伯夷叔齊栁下惠三人一經夫子稱道再經孟子助之其名遂定不然楊子云所謂東國之詘臣西山之餓夫也齊景公待孔子曰若季氏則吾不能以季孟之間待之曰吾老矣不能用也孔子行來解說禮貌薄不是蓋以季孟之間待夫子是大段禮貌厚了聖人豈緣此去齊景公待孔子不是當面說乃是商量待夫子之禮如此夫子亦不是當面說吾老不能用乃聞此語而說耳蓋齊景公雖尊聖人而不能用其言以季孟之間待夫子只是要商量相待底禮數非聖人之意也安得而不行故去齊接浙而行言其速也猶齊宣以萬鍾留孟子意齊人歸女樂季桓子受之三日不朝孔子行齊人歸魯侵疆設計以傾聖人季桓子三日不朝心術巳壞齊人之計行矣故夫子遂行曰彼婦之口可以出走然以膰肉不至而行此孟子所謂微罪也去就止速何其從容中道如此楚狂接輿歌而過孔子曰鳳兮鳳兮何德之衰往者不可諫來者猶可追已而已巳今之從政者殆而孔子下欲與之言趨而避之不得與之言鳳兮鳳兮何德之衰不是說夫子蓋說時節不好如鳳鳥不至之類是也嘆鳳鳥之莫聞而君德之莫致也往者不可諫來者猶可追猶云時尚可為也既而曰已而已而今之從政者殆而言今不可復為其從政事者增益其危亂而已矣觀接輿此言亦不是無意於世者故夫子下欲與之言然竟趨避而去如此等言語不可謂之不是只是缺講磨之功若與之往復論辨必須悟獨見之非惜乎不得與之言此聖人之所恨也長沮桀溺耦而耕孔子過之使子路問津焉長沮曰夫執輿者為誰子路曰為孔丘曰是魯孔丘與曰是也曰是知津矣問於桀溺桀溺曰子為誰曰為仲由曰是魯孔丘之徒與對曰然曰滔滔者天下皆是也而誰以易之且而與其從避人之士也豈若從避世之士哉耰而不輟子路行以告夫子憮然曰鳥獸不可與同羣吾非斯人之徒與而誰與天下有道丘不與易也子路從而後遇丈人以杖荷蓧子路問曰子見夫子乎丈人曰四體不勤五穀不分孰為夫子植其杖而藝子路拱而立止子路宿殺雞為黍而食之見其二子焉明日子路行以告子曰隱者也使子路反見之至則行矣子路曰不仕無義長幼之節不可廢也君臣之義如之何其廢之欲潔其身而亂大倫君子之仕也行其義也道之不行已知之矣若此等人不可謂之不賢正緣講究不明故所見有差别彼為無道不可與易聖人以為無道正吾所當易若有道則無用乎易也其差處正在此辟人者言見其人之不善則從而去之是為辟也人不與人為羣乃欲與鳥獸為羣不特待人太薄待已亦太薄矣荷蓧丈人為許行之學者也然能留子路宿見其二子其於人情不已處即天理之不可泯滅者也聖人以為可教故使子路反見之至則行矣何其畏人若此哉子路從聖人既久亦知大倫之義本出於一一處缺闕則他處皆非今知有長幼而不知有君臣此之謂不能充其類道之不行已固知之矣然不仕却不得直是無君臣之義而後可故君子之欲仕也行吾君臣之義而已至於用與否則在君而吾之義已盡矣此所謂講究精微不偏不倚如此雖然子路一日而見三隱者世之賢者伏於巖穴之中不得聖人為之依歸者何世蔑有堯舜在上皆賢哲之臣也逸民伯夷叔齊虞仲夷逸朱張栁下惠少連子曰不降其志不辱其身伯夷叔齊與謂栁下惠少連降志辱身矣言中倫行中慮其斯而已矣謂虞仲夷逸隱居放言身中清廢中權我則異於是無可無不可按禮記云大連小連善居喪蓋當時賢者也桞下惠身中清潔已自髙不為世所汙廢中權則逃遁自匿不為時所忌由無可無不可五字觀之一節自喜與敦化之功逺矣太師摰適齊亞飯干適楚三飯繚適蔡四飯缺適秦鼓方叔入於河播鼗武入於漢少師陽擊磬襄入於海按注家云魯哀公時禮樂廢樂人皆去蓋不應魯哀公時所有樂人同時皆去哀公雖削弱國事亦不應如此謬前輩說師摰自是周厲王時人由此一事觀之周衰樂廢樂官逃散乎四方聖人惜之故弟子追記於此耳周公謂魯公曰君子不施其親不使大臣怨乎不以故舊無大故則不棄也無求備於一人前輩以為施者陳其罪而戮之之謂也左傳曰施生戮死可也又曰施刑侯而尸雍侯與叔魚於市是也不施其親猶公族致刑於甸人之意此四事皆是寬厚之意所謂周公治魯親親而尊尊者可見於此矣不使大臣怨乎不以此尊尊也周有八士伯達伯適仲突仲忽叔夜叔夏季隨季騧周之八士如八元八凱然其事不載於尚書故後之人無考焉聖人作春秋士不書石尚書者貴其知禮也然則三代之時士不為大夫者其事業不顯亦多矣子張第十九子張曰士見危致命見得思義祭思敬喪思哀其可已矣來解以為士能見危致命見得思義故以此心而承祭自然思敬以此心而臨喪自然思哀不是此自是四事非是連上文利害是君子用力處喪祭是君子盡心處人能檢㸃此四者亦可以為士矣其可已矣猶事親若曽子可也之可子張曰執德不𢎞信道不篤焉能為有焉能為亡來解說上兩句云不足以有容不足以有守說下兩句云無所輕重於世若如此說恐無交涉蓋執德不𢎞則其人無所依據信道不篤則其心無所主張如此等人蓋無常之人夫子所謂罔之生也幸而免者也子張外飾之人而為論確實如此可謂進德矣子夏之門人問交於子張子張曰子夏云何對曰子夏曰可者與之其不可者拒之子張曰異乎吾所聞君子尊賢而容衆嘉善而矜不能我之大賢與於人何所不容我之不賢與人將拒我如之何其拒人也兩人趨向不同故議論亦異然論交之際其說皆通人之所以有交友者貴其有益也若不可與者泛然受之何益於我非所謂毋有不如已者之義也子張之說亦不可謂不廣大然非學者事此聖人教人不倦之功也若學者當學子夏至於子張之論非爾所及也子夏曰雖小道必有可觀者焉致逺恐泥是以君子不為也子夏之學流為莊周其原蓋出於此蓋此語有病聖人立論决不如此先聖之道凡小道皆異端也豈懼其致逺而泥乃有所不為哉子夏曰日知其所亡月無忘其所能可謂好學也已矣學問無止法善學者當有日益之功日計之不足歲計之有餘則善矣來解以為致其知而不已保其有而不失此語微有病若每日要求知其所未有每月又保其所有此大段擾擾矣子路未之能行惟恐有聞此求知之病也不忮不求何用不藏子路終身誦之此保其所有之病也能溫故知新可以語此矣子夏曰博學而篤志切問而近思仁在其中矣博學篤志切問近思為學之道盡於此此之謂明向上則有力行一事非是此四者可以謂之仁仁在其中猶學也祿在其中之謂子夏曰百工居肆以成其事君子學以致其道東坡嘗說學以致道甚深然却不與上文相連不用深說百工居肆以成其事君子為學亦須致道只須如此說言人各有本業須做到成就處方是子夏曰小人之過也必文人患不知其過才知便悔才悔便改今若文過則是已知過了知而文之則必不悔既不悔則必不改此其所以為小人也子夏曰君子有三變望之儼然即之也溫聽其言也厲此章語亦有病所謂子溫而厲者溫中有厲不是聽其言方知其厲君子有三變隨物賦形從容中道何啻萬變本於此一而已鄉黨一篇可見望之儼然即之也溫便是子溫而厲此章多是子夏言乃其門人私記如此病處甚多與聖人之言全别大率說得極辛苦子夏曰君子信而後勞其民未信則以為厲已也信而後諫未信則以為謗已也欲信人先從自信起自信甚難所謂有諸已者是也至於使人信已是使他人之心如我之心也不是自信得熟何以及此那件事不是信了方做得成故學問先從信起子夏曰大德不踰間小德出入可也德一也有大德小德何也即其全體而論之故謂之大德由其一節言之故謂之小德譬如仕止久速各從其可所謂出入焉者也然從心所欲不踰矩凡其所行曷嘗出於規矩之外哉子游曰子夏之門人小子當灑掃應對進退則可矣抑末也本之則無如之何子夏聞之曰噫言游過矣君子之道孰先傳焉孰後倦焉譬諸草木區以别矣君子之道焉可誣也有始有卒者其惟聖人乎來解以為下學上達之意非也子夏意不如此子夏之意以為學者當有次第蓋學者等級不同善教者亦須量其人而授之君子之道孰當光傳孰是後倦若是後倦之人則不當先傳與之此其等級次第不可亂也譬如草木有區以為之别矣是豈可相欺也除是聖人合下便理㑹得故有始有卒不至於後倦者惟聖人而後能耳子夏曰仕而優則學學而優則仕前輩說仕與學一也仕而優便是學學而優便是仕蓋仕而優非學何以致此學而優則出從仕豈復有二道哉子游曰喪致乎哀而止來解以為過則傷生不及則傷恩故一止於哀此語非也此蓋子游反本之論也周衰之時喪不如古禮多而哀少矣故夫子嘗曰喪與其易也寧戚子路亦曰與其哀不足而禮有餘也不若禮不足而哀有餘也子游之意亦如此喪極乎哀而止他事皆末也子游曰吾友張也為難能也然而未仁曽子曰堂堂乎張也難與並為仁矣不仁與未仁不同不仁是心術之病此小人之事未仁是學術之病學者容有之子張在聖門不得謂之不仁但仁之為道逺非篤實力行人未易至子張飾外不務實如何並為仁得此二子之所恨也子張有好髙之病無密察之功曾子曰吾聞諸夫子人未有自致者也必也親喪乎此一語孟子嘗言之曰親喪固所自盡也致之為言盡也自盡其心而已人那件事不當自盡其心但人罕能自盡於其親喪處觀之則天理形見不可泯滅矣樂正子春曰自吾母而不得吾情吾惡用吾情曾子曰吾聞諸夫子孟莊子之孝也其他可能也其不改父之臣與父之政是難能也孟莊子仲孫速也按襄公十九年八月孟獻子卒襄公二十三年八月孟莊子卒孟莊子為政才四年耳中間不見其事想此四年之中一遵其父之舊此正合夫子所謂三年無改於父之道是也當春秋之時世家大夫驟變其父之政者多矣故聖人喜之如此孟氏使陽膚為士師問於曾子曾子曰上失其道民散久矣如得其情則哀矜而勿喜善哉曾子之言也有司聞此有愧於斯民多矣古者司政典獄之臣雖上得其道民陷於罪猶有哀矜訓教反已自責之意若上失其道是教民於罪也不能自責而反以責民已羞愧矣况矜已自喜求工法律之外乎子貢曰紂之不善不如是之甚也是以君子惡居下流天下之惡皆歸焉言不善者必歸於桀紂然則紂之不善其初豈若是然哉朋而和之者衆矣是故趨向之初不可以不謹一入於下流則天下之為惡者皆歸之陷溺日深而不能自出也故曰紂為天下逋逃主萃淵藪子貢曰君子之過也如日月之食焉過也人皆見之更也人皆仰之君子有公過無私過事勢之適然固有不能免者亦有出於倉卒不熟之際檢㸃不及者故其過也人皆見之及人言以為不可或反諸吾心而不安則顯然與天下共改之何有於我哉夫人心之至明者不可亡也譬之日月之食也外物昏之明未嘗亡也及其復明則向之明者果安從來哉知乎此可以言進德矣衛公孫朝問於子貢曰仲尼焉學子貢曰文武之道未墜於地在人賢者識其大者不賢者識其小者莫不有文武之道焉夫子焉不學而亦何嘗師之有太宰嘗問於子貢子貢以為夫子天縱之將聖今答衛公孫朝之問又曰夫子焉不學蓋天縱見聖人資稟苟非學亦何以成就聖人之學與衆人同文武之道顯然在此人皆可學但恨人不能學耳衛公孫朝謂聖人之學必有非人所可知者叔孫武叔語大夫於朝曰子貢賢於仲尼子服景伯以告子貢子貢曰譬之宫牆賜之牆也及肩窺見室家之好夫子之牆數仭不得其門而入不見宗廟之美百官之富得其門者或寡矣夫子之云不亦宜乎宰我子貢有若三子孟子以為知足以知聖人然則子貢所言宗廟之美百官之富是亦知夫子之淺者耳况叔孫武叔乎叔孫武叔毁仲尼子貢曰無以為也仲尼不可毁也他人之賢者丘陵也猶可踰也仲尼日月也無得而踰焉人雖欲自絶其何傷於日月乎多見其不知量也世衰道微雖三家之子孫皆不及其祖父如孟武伯季康子之徒雖不能知聖人皆能尊敬之叔孫婼在春秋中亦略可喜若季孫斯叔孫州仇之徒不及其祖父益逺矣陳子禽謂子貢曰子為恭也仲尼豈賢於子乎子貢曰君子一言以為知一言以為不知言不可不慎也夫子之不可及也猶天之不可階而升也夫子之得邦家者所謂立之斯立道之斯行綏之斯來動之斯和其生也榮其死也哀如之何其可及也一言以為知一言以為不知謂君子不敢輕於言如此也蓋一言以為知又一言不敢以為知其自畏如此陳子禽在聖門中不知所學何事問三事皆謬其一問子貢夫子求聞是邦之政其二問伯魚有異聞其三以為子貢賢於仲尼也堯曰第二十堯曰咨爾舜天之厯數在爾躬允執其中四海困窮天祿永終舜亦以命禹曰豫小子履敢用𤣥牡敢昭告於皇皇后帝有罪不敢赦帝臣不蔽簡在帝心朕躬有罪無以萬方萬方有罪罪在朕躬此一段堯舜揖遜湯武征伐之本㫖盡在是矣堯舜之揖遜天也故曰天之厯數在爾躬湯武之征伐亦天也故曰敢昭告於皇皇后帝推見堯舜湯武與天心為一處故門弟子記録於此周有大賚善人是富雖有周親不如仁人百姓有過在豫一人謹權量審法度修廢官四方之政行焉興滅國繼絶世舉逸民天下之民歸心焉所重民食喪祭寬則得衆信則民任焉敏則有功公則說此一章說武王得天下事今於武成中略見式商容閭散財發粟大賚於四海而萬姓悅服列爵分土重民五教惟食喪祭惇信明義崇德報功垂拱而天下治是也又有下車封舜後一事自堯曰而下至此並不言子曰又後面一節頗似不相連此是聖人論次上古之事而得夫堯舜禹湯武王得天下之本與其施設建置之方可以為萬世帝王之法自寬則得衆而下是說武王之德緣寬便得衆信便民任敏便有功公便說觀武王武成所載可略見矣子張問於孔子曰何如斯可以從政矣子曰尊五美屏四惡斯可以從政矣子張曰何謂五美子曰君子惠而不費勞而不怨欲而不貪泰而不驕威而不猛子張曰何謂惠而不費子曰因民之所利而利之斯不亦惠而不費乎擇可勞而勞之又誰怨欲仁而得仁又焉貪君子無衆寡無小大無敢慢斯不亦泰而不驕乎君子正其衣冠尊其瞻視儼然人望而畏之斯不亦威而不猛乎子張曰何謂四惡子曰不教而殺謂之虐不戒視成謂之暴慢令致期謂之賊猶之與人也出納之吝謂之有司何謂尊中庸曰尊德性而道問學曾子曰尊其所聞則髙明此之謂尊均之為善也尊之則髙明卑之則蹇淺此五美者尊之則為美卑之則能為惡疑似之際美惡相懸若四惡者只是目前有司常行底事聖人推此以惡名之曰虐曰暴曰賊此何等名耶又以有司配之甚矣有司之惡也其原只是自便於已而責望於人其惡遂至於此為有司者可不戒哉孔子曰不知命無以為君子也不知禮無以立也不知言無以知人也學者先不要以得喪禍福入其心蓋此心既定定方能為學知禮所以修身知言所以接物其本之出於我者則一也此三事皆言知蓋致知之學當如此石鼓論語答問卷下
