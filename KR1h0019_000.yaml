body:
  text: 欽定四庫全書石鼓論語答問提要臣等謹案石鼔論語答問三巻宋戴溪撰溪有續呂氏家塾讀詩記已著録是書舊本有寶慶元年許復道序稱淳熙丙午丁未間溪領石鼔書院山長與湘中諸生集所聞而為此書朱子嘗一見之以為近道陳振孫書録解題所載與序相符其書詮釋義理持論醇正而考據間有疎舛如解緇衣羔裘節先加明衣親身次加中衣冬則次加裘裘上加裼衣裼衣之上加朝服其説本于崔靈恩不為無據然詩羔裘篇孔疏謂玉藻君衣狐白裘錦衣以裼之又云以帛裏布非禮也鄭注云冕服中衣用素朝服中衣用布若皮弁之下即以錦衣為裼即是以帛裏布故知中衣在裼衣之上其文甚明溪葢未之深考又解吉月必朝服而朝節謂玉藻天子𤣥端而朝日於東門之外不必依鄭注改端為冕葢稱端者通冠冕言之其説亦通樂記端冕而聼古樂鄭注端為𤣥衣孔疏端為𤣥冕凡冕服皆其制正幅故稱端也然玉藻天子𤣥端而朝日於東門之外與下文𤣥端而居對舉見異故朝日𤣥冕即不得通稱𤣥端此鄭所以决冕之誤為端溪亦失考也然訓詁義理説經者向别兩家各有所長未可偏廢溪能研究經意闡發㣲言于學者不為無補正不必以名物典故相繩矣乾隆五十四年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
