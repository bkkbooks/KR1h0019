body:
  text: 欽定四庫全書石鼓論語答問卷上宋戴溪撰學而第一子曰學而時習之不亦説乎有朋自逺方來不亦樂乎人不知而不愠不亦君子乎人之學問內外相為消長故無所得於中者必有求於外求而得則喜不得則怒此相應之理也若隱然自得既悅且樂宜乎其不愠也蓋玩味義理愈久愈出自是一般好意思來解謂當其可之謂時非也此時只是嘗嘗玩習令意思不間斷有朋自逺方來來解以為人見吾學力之至皆不憚逺而歸之所以樂却非也如此是要人知已若要人知已便樂則人不知已如何不愠兼人知已如何會樂樂自是胸次中事油然生於其中要勉強不得人便富貴之極亦只是自喜如何會樂惟是性分中方始言得樂字孟子所謂王天下不與存焉者是也有朋自逺方來者是得天下之賢者相與共學彼此相發明有不容言之妙此其為樂也至矣有子曰其為人也孝弟而好犯上者鮮矣不好犯上而好作亂者未之有也君子務本本立而道生孝弟也者其為仁之本與夫孝弟與作亂相去極懸絶人若未能孝弟何至便作亂有子乃合而言之若非見得人心親􅋀何以有此語夫大聲疾語者必非孝子順孫而孝弟之人必下氣怡色古人以好勇鬭狠為不孝謂為孝子者在醜夷不爭蓋人若孝弟其聲氣容色自别若不孝不弟必好陵其上之人好陵其上之人則忿爭之心不容但已便有作亂之理蓋世間自有一般人好與人爭競此其剛強忿戾生於中而不能自制人若有剛強忿戾之心則事事不委曲如何不會犯上禮記論為人子者交遊僚友國人宗族莫不稱其善蓋人才孝弟發見於外自然不同人人都以為好一不容於父母兄弟便不容於宗族鄉黨去為亂臣賊子者有之矣有子自其心術之微者言之而極其禍福之至也君子日夜所以經營者只此一事譬如下種譬如築基百行萬善悉從此出故有子為之言曰君子所務者本本立則道自生何者為本孝弟者仁之本仁者道之本也未有道不本於仁仁不本於孝弟者也子曰巧言令色鮮矣仁巧言令色只是處心不誠實人若不誠萬事皆壞不必説仁便是覺便是剛之類仁也者萬善之總名也人若誠實雖未為學終是不同若資質既薄便難與為善小則害身大則害人曽子曰吾日三省吾身為人謀而不忠乎與朋友交而不信乎傳不習乎人之學問若點檢不到一日之間多損少益不忠不信則於已有損不習則於已無益古之學者常自警察只就不好處點檢一毫不盡其情者皆不忠不信也子曰道千乘之國敬事而信節用而愛人使民以時千乘之國不易治也聖人説得極易只是自盡者已不擾民生事便可為也孟子論王道亦如此蓋聖人之論大抵簡易明白夫而字與以字不同猶溫故而知新敦厚以崇禮相似惟敬事故能信事若不敬於其初必率略不可行如何信得節用而愛人若不節用不免擾民如何愛得子曰弟子入則孝出則弟謹而信泛愛衆而親仁行有餘力則以學文近有新説云則以學文者以學而文之也此説害理只上面便是學如何更以學去文之也只依舊説夫文質兩字少不得棘子成説文猶質也為子貢所病但躬行當在先學文當在後學者要知次第耳子夏曰賢賢易色事父母能竭其力事君能致其身與朋友交言而有信雖曰未學吾必謂之學矣人皆謂聖人之門所從事者德行而已而文學蓋不與焉不知聖人之門不曽廢文學其教門弟子亦曰博學於文又曰則以學文德行之外亦有學文之科何嘗廢文學也子夏言賢賢事父母事君交朋友之外雖曰未學則是猶有學也但子夏反本之論故云爾子夏在聖門居文學之科乃能言及此是其所學過人逺矣易色竭力致身言而有信此皆就吾身上用功非面外著力也子曰君子不重則不威學則不固主忠信毋友不如己者過則勿憚改外先莊重內先忠信既有所本矣然後可以資益於人點檢於已此其為學之次第已若外面輕忽裏面不誠實如何問别人身上求益人亦如我何況滿身都是過更就何處點檢人須先有根本了始可以遷善改過朋友亦只是􅋀磋琢磨增益其所未至爾或謂無友不如已者若勝已者不肯與我友如之何蓋上焉者求友於不勝已則不可若下焉者求友於勝已何不可之有夫子曰商也好與賢已者處賜也好與不若已者處孟子亦曰今之諸侯皆好臣其所教不好臣其所受教蓋樂與不如已者友亦人之常情也曽子曰慎終追逺民德歸厚矣喪祭之禮薄則倍死忘先者衆矣易曰敦艮吉象曰敦艮之吉以厚終也欲民之厚當從人倫始人倫之至切緊者莫重乎喪祭此人心不可磨滅者也子禽問於子貢曰夫子至於是邦也必聞其政求之與抑與之與子貢曰夫子溫良恭儉讓以得之夫子之求也其諸異乎人之求之與聖人之德髙明廣大所謂川流敦化者子貢不言也止曰溫良恭儉讓此五者謙厚之極至與物為親如春風和氣人皆親之不待君子而後識也子曰父在觀其志父殁觀其行三年無改於父之道可謂孝矣曽子曰吾聞諸夫子孟莊子之孝其他可能也其不改父之臣與父之政是雖能也由此推之當時諸侯卿大夫輕變易其先君之政者多矣夫子兩言三年無改於父之道可謂孝矣蓋有所見而云非為匹夫單人發此論也周易蠱卦下至初六上至六五雖貴賤不同而為幹父之蠱則一大抵剛健者患其有變更之失柔弱者又患其無幹蠱之才故每貴於得中也或云三年無改於父之道若秦二世不能改始皇之暴漢昭帝能改武帝之失則二世為賢於昭帝也蓋不然聖人固曰無改於父之道若非道則固當改矣禮記曰先意承志諭父母於道蓋孝子之事親承志諭道之意存沒如一日也有子曰禮之用和為貴先王之道斯為美小大由之有所不行知和而和不以禮節之亦不可行也知禮記所言禮節民心樂和民聲又曰大樂與天地同和大禮與天地同節蓋和自是樂之事今有子論禮乃連和與節説若不是見禮樂實是一理如何説得如此親切蓋天地之間只是有自然之和聖人有禮樂亦只是達此和氣便行於天地之間爾故有子言之曰禮之用和為貴先王之道以此為美豈可一日無此和也然而小大並由無所差别亦有時而不可行也蓋只知和之為和而不知和之有節則亦不可以行矣故和而節者禮之所從始也猶中庸言親親之仁尊賢之義而繼之曰親親之殺尊賢之等禮所生也孟子亦曰仁之實事親是也義之實從兄是也而繼之曰禮之實節文斯二者是也有子曰信近於義言可復也恭近於禮逺恥辱也因不失其親亦可宗也親與近不同蓋親是親切處近只是密爾於此因近可以至親也有子之意以為信當出於義恭當出於禮若信不出於義則世之小人得不義之言以求一切之信恭不出於禮則脅肩諂笑以足恭為禮矣然使人之為信者盡合於義為恭者盡合於禮夫豈不善而人未必盡若此自近義而不失親於義者自近禮而不失其親於禮者是亦可宗也夫子曰恭近禮儉近仁信近情敬遜以行此雖有過其不甚矣夫有子此意蓋得之夫子也子曰君子食無求飽居無求安敏於事而慎於言就有道而正焉可謂好學也已大抵人心無兩用便是聖賢出來撫民物亦不遑寢食一意為民然後天下蒙福蓋此有所重彼有所輕不能兩立也人莫切於其身之奉養至於有所不恤則他事更無可纍者聖人亦只以此觀人如顔子亦只説簞食瓢飲居陋巷不改其樂子貢已下便不及此衣敝緼袍與衣狐貉者立而不恥是至微小事聖人却用此稱子路此亦人之所難能也今人一飽之外更無他念向上求飽生出無限奢侈求安更有無限不好事如此則一生只求了此兩件更無工夫幹别事故學者先要去此心此釋氏所謂粗緣也然後方有工夫理會學問飲食居處都記不得但一心向前做取合做底事連言語亦不暇説就有道之人是正此學其人如此可謂好學之切至者矣顔子一生只如此用工夫爾子貢曰貧而無諂富而無驕何如子曰可也未若貧而樂富而好禮者也子貢曰詩云如切如磋如琢如磨其斯之謂與子曰賜也始可與言詩已矣告諸往而知來者貧而無諂富而無驕是得一箇正好平過却未是有學問謂之無過則可爾至於貧而樂富而好禮却是有學問是進上一路然亦不可謂之盡善所謂是道也何足以臧之義故子貢因此遂得學問之義云向上有工夫在其所得乃在所問之外夫子因此却又説子貢可語詩又在子貢所答之外師弟子之間展轉相發明如此所以見聖人之善教人而門弟子之善學也子曰不患人之不已知患不知人也人不知我在我不害其為賢我不知人在我則不賢矣此固君子之所患也闕為政第二子曰為政以德譬如北辰居其所而衆星共之中宫天極星其一明者太一常居也或名天極或名北極或名北辰或名太一衆星皆動獨北辰不動王者恭已正南靣似之子曰詩三百一言以蔽之曰思無邪此一章是聖人論刪詩本旨蓋詩有三千餘篇今聖人刪去十只存一不知聖人因甚刪去許多因甚却留許多聖人説此三百篇一言斷之曰思無邪只是他發心處元無邪僻咏歌嗟歎譏刺諷諌本只是美意故録之其他所刪之篇亦有義理不合如所謂未之思也夫何逺之有之類是也亦有全篇之義不足取而一兩句可採者間見於他書而全篇刪去是也除此外則所刪之詩其問往往思慮未免有邪僻者人皆云先王之澤在泯故民所思無邪發而為詩皆正若如此説則三千篇詩皆當留聖人何故刪去先王之澤既衰當時列國自為風俗民生其間安能一一盡得如先王之時一時塗歌巷語豈無邪僻古今人情皆然也然而有一事今毛詩中亦有自敘述其嬉戲之樂諧謔之辭而聖人取焉夫安知其非邪哉然察其本心則有所為而云而非其思之本邪則取之此非聖人而何足以知之若只見其事如此便斷以邪正則常人皆能之不待聖人之刪也東坡亦言今小雅之詩稱道文武成康之盛德此誰知其為幽厲之詩者蓋察其辭有幽憂不樂之意是以繫之幽厲而無疑也察此意者非聖人其誰能之子曰道之以政齊之以刑民免而無恥道之以德齊之以禮有恥且格此章不是言治之本末先後不可紊只是將兩件事來比並爾其今之為政者那事不要整齊只得百姓整齊便事事整齊矣故為政之初便須用出榜曉諭人云某事合當如此若不如此便須有罪此所謂道之以政齊之以刑也今有一法不用出榜曉諭别自有道理曉諭得人亦不用治某罪用某罰别自有道理整齊得人須知夫道與齊兩字同而功用各别則人君自然捨彼取此民免而無恥一時雖整齊下來事事有民到得無恥何事不可做但未敢做爾若有恥且格既格後上面工夫大段做得何事不可為也子曰吾十有五而志於學三十而立四十而不惑五十而知天命六十而耳順七十而從心所欲不踰矩人皆言聖人天縱之聖不假學力所謂生知之者也夫聖人誠是生知然亦須用行聖人所以異於人者只是合下見處便與人不同及至行時用功又與人不同故其成功時遂與人不同若生知學雖曰不同至其行處用功一般則其到處亦必一般蓋誠明之學自有次第便是聖人亦須用學譬如天生物相似雖是極好之物亦須從開花結蘂乃至成熟自有時節要快不得王者化天下亦是如此薰陶漸漬合用許多時節但知是下種時與他人不同爾自志學時趨向工夫便别立與不惑只是身分上工夫到得知天命方始論到參天地贊化育事向上去遂與天地為一矣自别人説便是大而化之與聖而不可知聖人自説只是從心所欲不踰矩自在於本分爾天生聖人亦須用許大工夫方到極至處此顔子早死夫子所以痛恨而歸之於天也孟懿子問孝子曰無違樊遲御子告之曰孟孫問孝於我我對曰無違樊遲曰何謂也子曰生事之以禮死葬之以禮祭之以禮孟武伯問孝子曰父母惟其疾之憂子遊問孝子曰今之孝者是謂能養至於犬馬皆能有養不敬何以别乎子夏問孝子曰色難有事弟子服其勞有酒食先生饌曽是以為孝乎孟懿子是孟僖子之子向時孟僖子病不能相禮故其將卒命其子學禮於夫子今孟懿子來問孝聖人告之曰無違其意言無違父之遺訓則足以為孝矣不知孟懿子領聖人之意了不再問為復懵然而去不能再問也聖人懼其不曉也故退以告樊遲曰生事以禮死葬以禮祭以禮此三箇禮字是乃父之遺訓能行此禮便是無違無違便是孝也父母唯其疾之憂當時卿大夫溺於富貴不自愛其身者豈特孟武伯一人但既來問孝則是知世間有孝一字亦可教也故聖人因其身分上救之若子遊子夏便不同但就他學問未到處增益他向上一節爾自他人觀之善養亦難然學者不當止此養可能也孝為難孝可能也敬為難如此則養不足謂之孝孝之上更有敬字是大有資級也犬馬皆能有養謂之有養是犬馬亦有以養之也色難是察於幾微處非有視無形聽無聲之功不足以知此子曰吾與回言終日不違如愚退而省其私亦足以發回也不愚古人以為教然後知困蓋知困便會長進學者工夫全在問辨上前輩以為一番疑一番進益疑便問問必辨審問明辨便彼此相發明進德之階也若聖人與門弟子功用却不如此起豫助我之説是聖人誘進門弟子之機非教學相長之義也顔子只是受得聖人言語言下便領退時却自用工夫所謂博我以文約我以禮既竭吾才如有所立卓爾正是言下用功處也聖人看得顔子親切曰回也不愚又曰回也非助我也皆甚喜之辭也非特喜顔子蓋又自喜其得所授也子曰視其所以觀其所由察其所安人焉廋哉人焉廋哉注家説人焉廋哉然觀人始終安所匿其情此一句病若是人匿其情被我察得出如此却是聖人専教人察人隱匿使人無所逃不是聖人觀人之意蓋此三句統説觀人善惡皆在其中若是好人亦何曽匿情坦然明白教天下人自看覷著爾所謂人焉廋哉者言人之善惡不逃我所見爾豈曰人不能匿其情哉孟子亦是此意也至難之事無如知人若知人天下便可治此豈是小事若論知人之法無以過此三者却與孟子所説不同孟子之説却猶有測度向上人方識得若夫子之説則不論髙卑只如此有得仔細便見得人蓋難處是觀與視與察三字上若此三字上有一字鹵莽看得不親切便見不得便有錯處要去三字上見得聖人忠厚之意方好子曰溫故而知新可以為師矣記問之學不足以為人師溫故而知新却可以為師蓋記問有限義理無窮記問雖多而義理不明雖萬卷而無益若溫故而能新雖一言而有補矣知記問之不足以為師而後知溫故之可以為師一説溫故而知新能自得師矣古人有經師人師之説此説亦有意子曰君子不器易曰形而上者謂之道形而下者謂之器故禮記亦曰大道不器君子之於道由粗以入精故曰君子不器子貢問君子子曰先行其言而後從之此一段兩説一云先行是一句以行為先其言然後從之一云此説事君之義也先行其言是一句如孟子所謂言將行其言也則就之是也子曰君子周而不比小人比而不周來解云君子與小人相去本無幾特小人動輒反之此固是然少精微君子與小人正在相近處相反所謂名相近也實相逺也比與周羣與黨矜與爭和與同泰與驕其相近處才毫釐之間論其相反乃有霄壤之逺此君子所以察於毫釐之際也子曰學而不思則罔思而不學則殆今人不能博學便有説約之意終日危坐有所思索曰我將以為道也故才智之士得以訕笑之其病在於不學也古人論學與思嘗並説更欠一不得便見聖人亦曰吾嘗終日不食終夜不寢以思無益不如學也然學而不思則學自是學我自是我並無交陟管子曰思之思之又重思之思之不已鬼神將通之非鬼神之力也精神之極也此説得思極好子曰攻乎異端斯害也已當夫子時異端未熾聖人先有是説可見得聖人深見逺識直至後世與異端相為勝負所謂擈之而愈盛者不逃此二句却全與孟子功用不同一則是時勢不得二則是力量不及此事只要自家分明人心有所主宰自然不轉移却無口舌爭勝之理只以後世一事言之喪祭之禮薄仁人孝子無以塞其意故浮屠之説出而乘之仁人孝子始借此以塞其不滿之意其咎在於此道之不明也子曰由誨汝知之乎知之為知之不知為不知是知也子路却不是懷隱情於事師之間亦不是自安自恕之人此人剛心勇氣事事要知事事要做只看死生鬼神之間便是事事要知未之能行惟恐有聞便是事事要做既是事事要知及至不知處不免強探力取測度億中自以為已知矣世間事如何一一強要知得古人以致知為學問之首致知在格物若不向窮理上用功如何事事自知夫子曰蓋有不知而作之者我無是也多聞擇其善者而從之多見而識之知之次也由此言之以不知為知不特子路一人除非聖人便是生知若以下更有學知亦有困而知之者不知而欲強知是無時而可知也若自以為不知求所以知之則有時而知之矣此聖人誨子路致知之道也子張學干祿子曰多聞闕疑慎言其餘則寡尤多見闕殆慎行其餘則寡悔言寡尤行寡悔祿在其中矣大率人多言多過多做多失然而有合行合言處只要得十分審細多聞闕疑多見闕殆已是仔細揀擇了其既闕之餘又戒謹以言之戒謹以行之可謂仔細之至者矣然而又未敢保其無過直曰寡尤寡悔信矣夫人無過之難也易曰悔吝者言乎其小疵也人如何便到無悔尤地但寡尤悔已自大段淳謹篤實言行無偽然而子張學干祿聖人却如此答之蓋未能無過自是有咎安有得祿之理其得者自是僥幸若無過咎雖未便得祿然亦有可得之理所謂祿在其中亦未可言必有也孟子所謂修其天爵而人爵從之者非謂人爵從天爵也從之為言任之也詩言干祿豈弟古人亦嘗有此説故子張以是為急學耳與樊遲請學稼同意却不是泛然問也哀公問曰何為則民服孔子對曰舉直錯諸枉則民服舉枉錯諸直則民不服錯如苟錯諸地之錯謂舉正直而錯之羣枉之上以明示百姓則民服矣人君之服民只有兩事修已用人而已故又曰上好義則民莫敢不服季康子問使民敬忠以勸如之何子曰臨之以莊則敬孝慈則忠舉善而教不能則勸詳觀所解似未精純季康子非是竊權於巳欲民之歸季氏世執國柄民歸之久矣大抵權臣竊民不是威力便是姑息久之必自解散季氏之民已散於陪臣矣季康子亦知上世之所以得民者非其道也故慨然有感於中敬忠勸三字亦不是尋常泛問蓋季康子問弟子好學與冉求仲由大臣事其於聖門略知尊嚮矣大抵要斯民尊君親上改過遷善當於人心上用功欲用功於人心者當於自已身上上用功此簡易長久之道也或謂孔子曰子奚不為政子曰書云孝乎惟孝友于兄弟施於有政是亦為政奚其為為政為字猶中庸人不可為道並為凡建立條教號令賞罰之類皆為政也為此言者亦是當時卿大夫若季孟陽虎輩非學者問聖人事也却不知修身齊家時其為政也勤矣非無所為也亦非不為也但異乎人之為之爾子曰人而無信不知其可也大車無輗小車無軏其何以行之哉人在天地間羣必爭爭必亂所可恃者信而已人而無信是利則奪有便則逝雖一日亦住不得一步亦行不得故夫子又曰民無信不立子張問十世可知也子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者雖百世可知也唐書鄭虔傳稱鄭相如言孔子稱繼周者百世可知僕亦能知之其論説後來禍福如響乃知後世人如此説子張此一句蓋不特後人如此説子張之意其問亦如此所謂十世可知者泛然問及不指他事便是要問及後來事爾夫知來之事聖人於易拳拳言之然豈是教學者事此如子路問事鬼神并死相似然聖人却答他不知不得蓋彼所問不指名何事所謂十世可知者不知前十世後十世又不知是治亂是興衰是變更不可指一名以為名也故聖人因其所問而教之其意以為今所可知者只是禮若論禮之損益前十世如夏商可知也後十世如繼周者亦可知也所謂夏禮吾能言之之類是也典章文物因革損益是儒者合講底事子曰非其鬼而祭之諂也見義不為無勇也大抵説言患在牽強附合若此兩段合當相連説但來解説得支離意不出非其鬼而祭之品也則非其鬼者固不當祭也然人亦有所憚於此所謂有其舉之莫敢廢是也惟勇於義者能斷然不疑若知其義之當為而依違不決是無勇也此兩段是聖人有所為言之也八佾第三孔子謂季氏八佾舞於庭是可忍也孰不可忍也前輩嘗論以足蹙路馬有誅齒路馬有誅君臣之分信嚴矣何至所謂如此蓋聖人之意深矣平居無事之時習其臣子敬戒之心使見君之馬而不敢易焉等而上之君何啻如天之尊臣何啻如地之卑以此坊民民惡有犯其上者由此事觀之先王所以為是禮樂之等者皆所以習臣子敬戒之心也故亂臣賊子必先變易禮樂而後敢動於惡若季氏八佾之舞是也夫人所以不為不義者謂其不忍為也若一旦至於可忍則不復可以人道望之矣尚忍言之哉三家者以雍徹子曰相維辟公天子穆穆奚取於三家之堂三家者以雍徹則八佾之舞不獨季氏為然聖人獨罪季氏者季氏實為之首也夫無實之名不稱之禮小人猶受之至於舉他人之名而自有諸已非病狂者不為也身為大夫而詩曰天子穆穆非狂則病此聖人所以哀之也子曰人而不仁如禮何人而不仁如樂何詳觀來辭説得甚深奧然經旨自不如此此語聖人為季氏發也季氏僭禮壞樂已甚聖人甚傷之既而又曰禮樂亦只是有其位有其德方用得人到得不仁了亦如何用得禮樂正所謂猿狙衣周公之服但見其可笑爾僭竊已甚自取禍患禮樂具在初不緣此廢壞此聖人愛禮存樂之深意也林放問禮之本子曰大哉問禮與其奢也寧儉喪與其易也寧戚林放問禮之本聖人答以禮與喪兩字蓋喪禮與他禮别故分别言之今禮記中於論禮外别專記喪禮極詳儉與戚却不是禮只是就其本言之蓋論其所自生也元只是汙尊抔飲蕢桴土鼓就中制禮以文之元只是哭泣無時哀號劈踊就中制禮便是哭泣之數劈踊之節緣有此禮故其葬至於文反其初而觀之必有裁制損益之道也子曰夷狄之有君不如諸夏之亡也此一段上面之字極著力若只説夷狄有君却是諸夏無君矣蓋夷狄有君與諸夏有君不同但夷狄之有君却不如諸夏之無君是夷狄猶有其君也此聖人傷時之極有居夷浮海之歎焉季氏旅於泰山子謂冉有曰女弗能救與對曰不能子曰嗚呼曽謂泰山不如林放乎季氏僭禮聖人甚憂之非憂季氏也憂禮之壞也女弗能救者救季氏所以救禮也人不能救便以此意望之於神傷之之意深望之之意切矣春秋威公不書秋冬之意子曰君子無所爭必也射乎揖讓而升下而飲其爭也君子禮記射義曰詩云發彼有的以祈爾爵祈求也求中以辭爵也酒者所以養老也所以養病也求中以辭爵者辭養也由此觀之射不中而飲者非以為罰爵也是乃所以養之也發的以求辭爵者非懼罰也謙遜卑下不敢當人之養也君子無所爭於此處觀之可也射不爭勝負而爭欲自處於謙遜卑下之地其爭乃如此此可以為君子也與揖遜而升下作一句蓋既下而升飲也子夏問曰巧笑倩兮美目盻兮素以為絢兮何謂也子曰繪事後素曰禮後乎子曰起豫者商也始可與言詩已矣此一段當細考禮記曰甘受和白受采忠信之人可以學禮如此則是以白喻忠信以采喻禮今子夏之論乃以素喻禮此必有説也子夏所以疑詩人之辭者亦是未曉詩人之言謂巧笑美目若此乃以素為文何也夫素非所以為文也夫子答以繪事後素證素之可以為文也周禮載畫繪之事後素功説者謂先施色後布素為其漬汙也易漬汙之語不是蓋後素之意雖有綵繪之色非用素以間次之則采繢不彰論語注云以素分布其間是也彼畫繪之事當以五色為上今乃以素分布其間始成藻繪之飾甚哉素之有益於人也推其類觀之則反本之論當有所歸子夏因此遂悟得後素之義知聖人制禮之意乃是以素飾盡之意則素者為禮而文者非禮也此夫子所以喜之與蓋謂其展轉發明不只就一處上見若只就一事上見得一事亦只是尋常學者所為非聖門工夫也子曰夏禮吾能言之杞不足徴也殷禮吾能言之宋不足徵也文獻不足故也足則吾能徵之矣禮記載言偃問夫子曰夫子之極言禮也可得聞與孔子曰我欲觀夏道是故之杞而不足證也吾得夏時焉我欲觀商道是故之宋而不足證也吾得坤乾焉坤乾之義夏時之等吾以是觀之由此語觀之夫石鼓論語答問卷上
