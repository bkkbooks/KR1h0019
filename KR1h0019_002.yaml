body:
  text: 欽定四庫全書石鼓論語答問卷中宋戴溪撰泰伯第八子曰泰伯其可謂至德也已矣三以天下讓民無得而稱焉前輩謂許由只能逃堯不能逃名若名已相隨逾逃而逾至蓋不由已所謂至人無名者形迹俱泯不待有其名而逃矣善乎范蔚宗之言曰泰伯伯夷未始有讓也所謂未始有讓者緣當初不曽是為讓一字做出許多事來當初泰伯伯夷只道是君父之命不可違兄弟與我一也是以去而不立胸中終不曽道讓是好事要去做此所以民無得而稱他本無讓之心安得有讓之名百姓又何緣得知且如韋元成劉愷丁鴻之徒雖未必是勉強矯拂以求名只是他胸中畢竟道是好事有心去做所以欲逃此名不可得被朝廷迫促明有貴讓時也緣此泰伯三以天下讓按史記泰伯知古公欲立季歷而亡去荆蠻斷髮文身却不曽見他三讓如漢文所謂南鄉讓天下三之類兼泰伯若在此遷延退讓至于再三百姓亦自得而稱矣明道先生曰三讓者不立一也逃去二也斷髮文身三也此説是若使泰伯當初只是不立不逃去若逃去不斷髮文身亦恐未免有顧戀意思直使斬截得恁地分明當初百姓只見得泰伯若狂惑之為者後世聖人推見至隱便見得泰伯此三事都是他讓天下處所謂三以天下讓者亦是聖人推原周家得天下之本處如王迹起於后稷之意若曰泰伯逆知文王之聖可以得天下而讓焉雖武王牧野時無是心也而况於泰伯乎子曰恭而無禮則勞慎而無禮則葸勇而無禮則亂直而無禮則絞甚矣禮之功用甚大也聖人専將此去約人歸於中蓋此有防範規矩底物有所持循遵守初學之人不可一日無此一日無此直是不可以立恭與慎與勇與直都是極好資質勞與葸可謂有害於身亂與絞可謂有害於人人有極好資質只緣無禮以節之遂至甚害如此人之為學豈可一日無禮不好資質又不曽學禮其禍豈可勝言哉此四句只是慎而無禮則葸一句難説蓋慎之一字如執圭鞠躬執虛如執盈之類是也此亦自有中禮處若無禮則心志沮喪血氣潰亂亦大有害事處君子篤於親則民興於仁故舊不遺則民不偷聖人在家庭上用功只是要在斯民心術上理會大抵事事近厚方能上下相安溫公曰受人恩而不負者為子必孝為臣必忠夫辜恩負義之人必非忠臣孝子而一言一語不相背負者必可以託六尺之孤聖人所以能固結民心患難不相棄者皆自其父兄子弟始若子弟不有父兄夫婦不相存朋友不相保鍥薄如此亦何有於君上蓋一處壞則百處壞矣秦人立法專一離人父兄親戚之愛前輩謂古人立法勸人為善秦人立法禁人為善曽子有疾召門弟子曰啓豫足啓豫手詩云戰戰兢兢如臨深淵如履薄氷而今而後吾知免夫小子甚矣此身之可畏也凡天下之物可以生之者皆可以殺之一事不謹死有遺恨古之君子愛護此身如璧玉蓋此身非我所自有未死之前皆不足恃當事事點檢使無一事可恨及其啓手足也奉父母之全體還而歸之使死者有知從父母於九原至此蓋不足恨也曽子有疾孟敬子問之曽子言曰鳥之將死其鳴也哀人之將死其言也善君子所貴乎道者三動容貌斯逺暴慢矣正顔色斯近信矣出辭氣斯逺鄙倍矣籩豆之事則有司存逺暴慢近信逺鄙倍有二説其一説已其一説人樂記稱致禮以治躬致樂以治心心中斯須不和不樂則鄙詐之心入之矣外貌斯須不莊不敬則慢易之心入之矣如此説當稱在已可也中庸稱動而民莫不敬言而民莫不信行而民莫不説如此説當稱在人可也前輩亦多作在已暴慢説若參考文意却恐不是説在已何故緣斯字説不通若説動容貌斯逺得暴慢未動容貌時如何兼未曽於心術用功難為動容貌便逺得暴慢至如正顔色斯近信此語尤説不通前輩説有諸已之謂信間常時不曽信如何正顔色便近信莫不相交涉否緣其間有窒礙不通處遂不免去上面一字都重説了如動如正固重説得如出一字如何重説前輩將修辭説出辭氣却不知修字與出字大段不同難為如此説曾子之意以為君子所貴乎道者為其功用甚大故也道全德備後才動容貌民莫不敬暴慢自逺矣才正顔色不待號令而民之信者過半矣才出辭氣民莫不從鄙倍自逺矣所謂大哉王言一哉王心皆逺鄙倍之類也樂記曰內和而外順則民瞻其顔色弗與爭矣望其容貌而不生易慢焉故德輝動於內而民莫不承聽理發諸外而民莫不承順其此之謂乎君子之所以用力於斯道者為其若此故也到得籩豆之事事關宗廟尚付之有司則其他事不問可知矣曽子之意不特為孟敬子設使孟氏略知此説此魯之幸也大抵聖賢憂民之心到死不泯曽子曰以能問於不能以多問於寡有若無實若虛犯而不校昔者吾友嘗從事於斯矣君子之心自視歉然視天下皆可師之人學問無可止之法但見人皆能而我不能人有我無人實我虛我且無有尚復與誰校耶昔者吾友不明言顔子而先儒皆以為顔子何也孔門中只有顔子可當此是以斷然歸之顔子無疑從事於斯蓋十分於上面用工來曽子曰可以託六尺之孤可以寄百里之命臨大節而不可奪也君子人與君子人也魯直云與人言而靣謾豈可寄百里之命其説命字與舊説不同舊説謂百里之民命當依此説也人之觀人亦於利害者察之耳利害輕而後可以為君子平居髙論無一事不能一旦嵗寒萬事瓦解此三節只是不負此心孟子曰行一不義殺一不辜而得天下皆不為也亦知是不負此心爾曽子曰士不可以不𢎞毅任重而道逺仁以為已任不亦重乎死而後已不亦逺乎善有力惡亦有力故學者若無力一步亦進不得前輩云曽子此數語極有力兹事事大體重學者無志於斯儘悠悠不妨若出來擔當此事日引月長非大有力量負荷不去譬如重載適逺前靣更有無限艱阻車馬堅好強力不倦終有必到之理車敝馬羸曰未中而稅駕其與未出門等耳古人論學所以貴勇貴剛者為此子曰興於詩立於禮成於樂前輩論為學有次第以為看伊川語録不可一例看有初學入門處有體證處有感發處有持守處有調習處有涵養處有觀盡處有感應處學者有得於詩則能興起善心謂其有感發處也有得於禮則能立身謂其有持守處也有得於樂則自然成就謂其有涵養處也此論為學次第兼言學者不可専事文義精義中説此一段最詳子曰民可使由之不可使知之民可使由之不是恐民之智將以愚之亦不是匹夫匹婦之愚不可與知此一段自是論聖人動化之道可使民由之所謂鼓舞震蕩忽焉若神耕食鑿飲不知帝力於我何有之類是也若使民知之則是在我未免有形迹而道化之在民者亦淺矣王者皥皥所謂由也霸者歡虞所謂知也水涸魚相喣以濕相濡以沫不如相忘於江湖子曰好勇疾貧亂也人而不仁疾之已甚亂也此一段只是論人不可有忿疾之心才有忿疾心便憤激憤激者禍亂之階也如好勇疾貧固不待説人而不仁疾之已甚雖曰疾惡然自家先懷憤疾之心一事做不成激成禍患者多矣亂字不必一一説到僭奪但是不循理為患害者皆亂也人之所以能安貧者有二其一是守道安分其一只是力不足俯首甘心若天資勇鋭力足以行其志才有疾貧之心其胸中憤憤然不能一朝居小則椎理發冡大亦能呌呼橫行譬如毒蛇蝮蝎必噬嚙草木以致其毒而後已人到得不仁已是胸中悖然了自家只有寬緩馴擾矜憐哀撫收拾懲誡之意若忿疾已甚必有不肖之心應之斯不可救也此其亂雖在人其所以致亂者實在我故曰亂也與好勇疾貧同子曰如有周公之才之美使驕且吝其餘不足觀也已謝上蔡謂克已工夫未肯加吝驕封閉縮如蝸驕是不能進善吝是不能改過驕吝不除自為封閉其縮如蝸是也聖人所以為聖人者只是論德不是論才驕吝尚存更説恁德此其所存也無幾矣尚何觀焉自古聖人多才者無如周公故三代聖人禮樂至周公纎悉盡備更無一事欠闕周公固可謂多才藝者聖人之語及此極言多才不足恃便使才如周公驕吝尚不足觀何况么麼之人能有幾何而恃才不學鮮有不殺其身者也子曰三年學不至於穀不昜得也三年學不至於穀何也只是善不昜得也古人為善直是用功如惟日不足如雞鳴而起大扺此心如救焚如拯溺如追亡人如飢渴切身只緣是不可容昜得三年學亦可謂從事於善矣若説便到於善亦未敢造次相許此教學者強勉不倦之意又曰一日克巳復禮天下歸仁何也用功時直是一生到時只是一日子曰篤信好學守死善道危邦不入亂邦不居天下有道則見無道則隱邦有道貧且賤焉耻也邦無道富且貴耻也篤信好學橫渠先生曰篤信若不好學亦不失為善人信人此語恐未必然篤信好學只是一事篤信而好學守死於善道如此而巳今匹夫匹婦酷信佛法誦經便是篤信好學耶貧且賤耻焉不是耻貧賤是耻不得列為君子也此一假極言學者強力自守處言當做底事直是斬釘截鐡做到徹骨不當住去處直是褰裳疾走若將浼焉可出時便出可隱時便隱直是堅強不變如此與子路問強一假相類且是見得徹信得及做得堅無所擬議無所計較無所顧戀到此方謂之力學行一不義殺一不辜雖得天下直是不為簞食豆羮不以其道雖餓死直是不受非其道非其義一介直是不與一介直是不取兵可去食可去信直是不可去可殺可辱直是不可使為不義學者須是守此心到死不變子曰不在其位不謀其政前輩謂不在其位不謀其政所謂君子思不出其位恐未必然蓋政是國家大事夫子所謂其事也如有政雖不吾以吾其與聞之是也蓋天下有道則庶人不議賤臣圖柄臣者非國之福也不任其事而與聞其謀鮮不為身禍與國家之禍者漢黨錮事可略見矣子曰師摯之始關雎之亂洋洋乎盈耳哉石林説亂為卒章是今離騷卒章稱亂曰大要關雎必非文王時作故史記曰周道缺詩人本之袵席關雎作是傷今思古之詩也然當時賢者雖追述其事而為之詩未必被之聲歌今毛詩如此多何曾一一用為樂章及至師摯推原關雎之義為之聲音用之鄉人用之邦國故洋洋盈耳司馬遷所謂師摯見之者甚言師摯識本末使此詩被於聲歌致鄉人邦國慣於聽聞庶幾正家而天下定之意人皆知之此亦夫子之意也子曰狂而不直侗而不願悾悾而不信吾不知之矣人之資質不怕他魯鈍猖狂只怕他不誠實若真箇誠實百撲不碎隨他分量皆會成就若不誠實一事不成萬有餘喪譬如物才滲漏了便傾江河在中亦不濟事不直不願不信只是一箇不誠實狂與侗與悾是不好資質只有一點誠實在尚可救若連一點都無更説恁麼譬如病既不好又無元氣安得不死夫子許琴張曾晳牧皮謂其狂而直進互鄉謂其侗而願不絶鄙夫謂其悾而信也子曰學如不及猶恐失之子曰巍巍乎舜禹之有天下也而不與焉夫以匹夫而有天下亦可謂甚異甚大之事正使君子處此亦須略入其心舜視有天下與耕稼陶漁時相似禹視有天下如過家門不入時相似此之謂不與夫惟不有天下是故能有天下不與猶言天下與舜禹不相涉子曰大哉堯之為君也巍巍乎惟天為大惟堯則之蕩蕩乎民無能名焉巍巍乎其有成功也煥乎其有文章惟天為大惟堯則之蕩蕩乎民無能名焉內之德也巍巍乎其有成功煥乎其有文章外之業也無者非聖人不足以知之有者衆人皆見之惟無故能有其所以致此者何也曰渾淪之間無物不有無物不備只是大後如此司馬氏謂明德自虞舜始禮記亦曰後世雖有作者虞舜弗可及也已前輩謂譬之四時堯春也舜夏也此夫子之意也舜有臣五人而天下治武王曰豫有亂臣十人孔子曰才難不其然乎唐虞之際於斯為盛有婦人焉九人而已三分天下有其二以服事殷周之德其可謂至德也巳矣前輩多言三分天下有二以服事殷此夫子言文王之至德亦有不足於武王之意然參考此段夫子只言周之德不指言文王安知便専説文王中間又不曽間以子曰只是連上文説武王事亦難為專指文王也按武王曰豫有亂臣十人此尚書泰誓文其時在牧野夫子論武王亂臣之説因及牧野之事明當時武王君臣之本心言周家之事亦可謂至德三分天下有其二猶服事商今日牧野之事大是不得已武王之君臣可以無責矣自才難而下專説武王故唐虞之際於斯為盛斯此也此指武王則此一段專為武王説引舜為證耳子曰禹吾無間然矣菲飲食而致孝乎鬼神惡衣服而致美乎黻冕卑宫室而盡力乎溝洫禹吾無間然矣君子為善懼其墮於一偏便被人點當若事事適中無偏倚處便可以關百聖而不慙百世以俟聖人而不惑今墨家者流以為其道出於禹以裘褐為衣送死桐棺三寸曰此禹之儉然也日夕不休以自苦為極曰此禹之勤然也摩頂放踵利天下為之曰此禹之愛人利物然也夫克勤於邦克儉於家胼手胝足過家門不入固自有從容中道者不若是也聖人枚數其實兩言吾無間然懇切如此夫亦疑後世將有此弊乎子罕第九子罕言利與命與仁前輩謂利之害重命之理微仁之道大故罕言又云利不可以屢言命不可得而言仁非其人不可與之言故罕言竊意未盡精微聖人本欲無言凡語言皆出於不得已若於合著説所在儘説教分明若於不當説所在便一句也不説何嘗立定説道某事須少説某事須多説此一段只是門弟子記夫子平日教人實事夫子朝夕為學者言不出詩書禮樂日夜以此博約學者使弗畔於道至利命與仁罕嘗説乃弟子記所見云爾至繫易何嘗不説利不説命對門弟子之問何嘗不説仁一部論語孜孜説不休此所謂到合著説所在儘著説教分明達巷黨人曰大哉孔子博學而無所成名子聞之謂門弟子曰吾何執執御乎執射乎吾執御矣古者君子習御與習射故問大夫之子長曰能御幼曰未能御夫子之聖同時知夫子者最是儀封人與達巷黨人名字皆不聞此亦是當時隱者孟子論三子智足以知聖人汙豈不是説得夫子廣大但只是説得大不曽説所以大故謂之知聖人汙今達巷黨人以博學無所成名為夫子之大此正與夫子説大哉堯之為君蕩蕩乎民無能名相似可不謂之識聖人乎自識者觀聖人見其無所成名但見其大自聖人反觀其身猶不敢以一藝自名但見其小吾何執執御執射者疑辭也不敢以一藝自名之意子曰麻冕禮也今也純儉吾從衆拜下禮也今拜乎上泰也雖違衆吾從下大古冠布齊則緇之冠布者謂用白布為冠常所冠也至齊戒則染之為緇三代時用冠布為喪冠别有委貌章甫等其形雖殊然俱用緇布為之常服之冠也委貌等冠用漆布古者君有賜於其臣與宴饗之禮君酬賓皆降拜稽首故齊桓公云小白余敢貪天子之命無下拜天下事若不是十分害義禮事雖聖人亦未嘗敢以為異事到害義禮處直是流俗可畏若居今之世視几案之安器用之便必曰席地而坐汙尊而抔飲者世無是理也子絶四毋意毋必毋固毋我伊川先生曰意者任意必者必行固者固執我者私已橫渠先生曰意有思也必有待也固不化也我有方也范曰意者已之思也動於內而係於事則有必必則守而不移故有固固則不能正故有我三者皆出於意故意為之先吕曰意則無義必則無命固則無時我則無天謝曰孟子謂必有事焉而勿正正即意也必如必信必果固則所過不化我則不能大同於物右前賢説意必固我四字極親切請子細看就中謝上蔡説得尤精微范太史説毋意在先固好然前輩多云此四事毋我為主夫意必固我既毋之後更有何物正所謂寂然不動志氣如神喜怒哀樂未發萬物皆備於我也前輩以為意必固我既亡之後學者所宜盡心竊有疑焉又云毋作禁止之辭聖人絶此四者何用禁止竊謂聖人用功亦不造次古人於此下克字制字懲字窒字其自檢制處極嚴惟毋故能絶若不絶遇境即發矣子畏於匡曰文王既沒文不在兹乎天之將喪斯文也後死者不得與於斯文也天之未喪斯文也匡人其如豫何天下之事不當如是而如是者皆天也人見其人而不見其天聖人見其天而不見其人見其人故有忿怒有怨恨有計較有恐懼見其天故無忿怒無怨恨無計較無恐懼此一段是聖人見得天理透徹擔負得過斷制得堅處只怕文王既沒文不在此又怕天斫喪斯文使後死者不得與聞斯道便不奈何若世道決無滅絶之理文王之文決在聖人世亦決無人事勝天之理太宰問於子貢曰夫子聖者與何其多能也子貢曰固天縱之將聖又多能也子聞之曰太宰知我乎吾少也賤故多能鄙事君子多乎哉不多也牢曰子云吾不試故藝天縱猶言天生自然而無所容心之謂也太宰以多能為聖不必責其不識聖人彼且謂聖者特多能之别名耳聖人不謂太宰不知已意間只道我自是少賤了故偶然多能便喚多能為我之聖安敢當此何况君子亦不貴多能前輩謂子貢亦答不是又多能也一句亦道多能是好事意謂聖人先自聖了又分外多能爾如君子不多之句因可以教子貢此多學而識之語子貢所以猶未悟也子曰吾有知乎哉無知也有鄙夫問於我空空如也我叩其兩端而竭焉古人有言曰溺者入水拯之者亦入水狂者東走逐之者亦東走愚者同死生聖人亦同死生是故聖人之空與鄙夫之空一也聖人因鄙夫之問叩其兩端無有焉返而體察吾身其空空殆同於鄙夫故曰無知也人能知此理然後知顔子屢空蓋從事焉未能所謂有若無者猶未造於無也子曰鳳鳥不至河不出圖吾已矣夫謝上蔡説此一段好云非必指河圖出與鳳鳥至也特借此言明王不興爾故嘗為之説曰顔淵子路死聖人觀之人事鳳鳥不至河不出圖聖人察之天理不復夢見周公聖人驗之吾身夫然後知斯道果不可行而天下之果無意於斯世也子見齊衰者冕衣裳者與瞽者見之雖少必作過之必趨古者有喪者專席而坐故齊衰不以邊坐大功不以服勤大功廢業緦不祭齊衰不以弔不以輕服而重相為也其重服也如此先王制爵祿以寵有德車服以庸有功惡可慢也人有八疾皆聖人所憫瞽者無見聖人尤不敢忽顔淵喟然嘆曰仰之彌高鑽之彌堅瞻之在前忽焉在後夫子循循然善誘人博我以文約我以禮欲罷不能既竭吾才如有所立卓爾雖欲從之末由也已中庸以為誠則形形則著夫子曰立則見其參於前在輿則見其倚於衡此所謂見道非聞見之見也此理至微至深非自有見者不知也仰之彌髙至忽焉在後顔子蓋嘗用功矣而有見未定及夫加博約之功竭盡其才如有所立是又見得親切矣但竭其才只到此自此以上非才所能及也彼無所見此無所從合而為一此之謂化所謂過此以往未之或知也子疾病子路使門人為臣病間曰久矣哉由之行詐也無臣而為有臣吾誰欺欺天乎且豫與其死於臣之手也無寧死於二三子之手乎且豫縱不得大葬豫死於道路乎葉石林曰古者卿得臣其邑大夫不得臣其邑當此之時大夫惡有不僭卿者今按陳子車死於衛其妻與家大夫謀以徇葬家大夫所謂陪臣也又叔孫豹卒其宰家臣皆稱宰在昭公四年甚詳杜泄以路葬而盡其卿禮以此觀之卿大夫死其家臣實主其葬子路之意亦與請禱之意相類大意是愛聖人以姑息謂夫子嘗為大夫亦可以立家命門人為臣有如不幸而死治喪之禮與葬之禮皆可以從厚使門人為臣之意蓋生成其為大夫死則以大夫之喪治之可也子路蓋嘗自嘆曰傷哉貧也生無以為養死無以為葬其意以厚葬為報其親故今日之事亦以此為愛聖人爾不知聖人既去魯司冦且未嘗為卿於魯安有自臣其門人之理此事人莫不知已不可欺直是只欺得天爾子路亦可謂愚矣夫子所以責之深切者有如邂逅因疾而死此事不及知他日門人奉以從事如顔子死門人欲厚葬之夫子尚爭不得至是豈不大害義理觀夫子卒門人治喪皆極恩意此事儘好但厚葬聖人則決不可夫子沒後門人中子貢築室曽子不肯事有若子夏論葬等事皆是有得於聖人子貢曰有美玉於斯韞櫝而藏諸求善賈而沽諸子曰沽之哉沽之哉我待賈者也君子所貴於學者為其有用於斯世也凡天之生物雖一草一木猶有利於人而况君子乎獨善其身事不得已懷寶迷邦天下何賴焉前輩謂子貢此語未知聖人不合説求字要之子貢亦是這般問及觀其答子禽之問曰夫子之求之也其諸異乎人之求之歟蓋知聖人矣子欲居九夷或曰陋如之何子曰君子居之何陋之有後漢東夷傳序曰夷有九種曰畎夷于夷方夷白夷黃夷赤夷玄夷風夷陽夷故孔子欲居九夷也又傳曰箕子遭殷衰之運避地朝鮮即東夷也始其國俗未有聞也及施八條之約使人知禁遂至國無淫盜門不夜扄回頑薄之俗就寬略之法行數百千年故東夷通以柔謹為風異乎三方者也苟政之所暢則道義存焉仲尼懷憤以為九夷可居或疑其陋孔子曰君子居之何陋之有亦徒有意焉耳傳論所言九夷風俗之美此箕子之化容有之然言聖人懷憤欲居九夷則妄矣聖人此意亦只是乘桴浮海之意豈真欲居耶子曰吾自衛反魯然後樂正雅頌各得其所班固曰周道始缺怨刺之詩起王澤既竭而詩不能作王官失業雅頌相錯孔子論而定之故曰吾自衛反魯然後樂正雅頌各得其所然季札請觀周樂為之歌二南以至於頌皆有條理豈得謂之雅頌相錯葉石林曰雅以正變為大小頌以所作為先後者詩未刪之序也論正事之廢興而以其所陳者為小大推功德之形容而以其可告者為先後此夫子刪詩之序也夫如是而後樂正矣子曰出則事公卿入則事父兄喪事不敢不勉不為酒困何有於我哉謝上蔡曰事公卿父兄勉喪事能盡事易盡道難如夫子事魯衛之君始可謂事公卿如曽閔者始可謂事父兄必誠必信勿之悔始可當大事齊聖溫克始可謂不為酒困右謝上蔡説意語極深然聖人此一段只是人道之常如飢食渴飲相似子在川上曰逝者如斯夫不舍晝夜此聖人觀物之學天下之事日夜相代乎前矢激川流一息不停尚復固閉留滯亦可謂所過不化矣伊川先生曰言道之在如此恐未然東坡曰逝者如斯而未嘗往也此語乃佳當知川流不息而水之清明者未嘗動則知君子所存者神矣子曰吾未見好德如好色者也按史記孔子在衛衛靈公與夫人同車宦者雍渠參乘出使孔子為次乘招搖而過市孔子曰吾未見好德如好色者也於是醜之去衛適魯古之人君其待賢者入則同食出則同輿猶不敢自以為至而况與婦人同車宦者參乘乃使聖人次其後乎聖人於衛靈公有際可之仕猶如此宜乎其急於去衛也子曰譬如為山未成一簣止吾止也譬如平地雖覆一簣進吾往也事之成否不問事只問人心苦人心堅固正雖下種必可成就若一念廢怠便復成實亦未可保莫道事已垂成所爭不多若掘井九仞而不及泉與未下鍬钁同故曰苟為不熟不如稊稗此學問之所以甚嚴也吾進吾止猶曰我自進自止非關人事也子曰語之而不惰者其回也歟伊川先生曰語而敬故不惰恐未然門弟子聽受聖人之言安有怠惰不敬者亦須斂意肅容請事斯語然退省其私未必能奉承不惰顔子拳拳服膺與三月不違仁欲罷不能者皆所謂不惰也子謂顔淵曰惜乎吾見其進也未見其止也古今聖賢同此一止所謂有先知焉知則無先是也顔子有可與幾之功而未造於存義之地子曰苗而不秀者有矣夫秀而不實者有矣夫天下之物才是美物有用者便不胡亂生且看當春時凡草木不種自生至於名花異卉必須十分封植栽培方始生若人事不至難為全看天也苗而不秀秀而不實者嵗多有之若稊稗則不然矣人但道種子好條葉茂便放下若人事一處不到便不會成就今人學問亦有自胚胎壞之者亦有自半塗壞之者胚胎壞者不耘苗者也半塗壞者揠苖者也子曰後生可畏焉知來者之不如今也四十五十而無聞焉斯亦不足畏也巳此一段人多作兩截説不是大意只謂後生固可畏渠那知後來一截不似如今恃才不學聰明不及於前時者多矣後生所以可畏者謂其年少敏鋭將次成就不可禦也若遷延到四五十别無可言者亦是常人爾何足畏之有此語是戒後生深切處韓退之曰少之與長也異觀少之時人為童子之異及其長也將責成人之禮焉成人之禮非盡於童子所能而已也此意與夫子同子曰法語之言能無從乎改之為貴巽與之言能無説乎繹之為貴説而不繹從而不改吾末如之何也已矣伊尹曰有言逆于汝心必求諸道有言遜于汝志必求諸非道此人君聽言之法也夫子曰法語之言能無從乎巽與之言能無説乎此人臣進言之法也人臣進言之法出於此二者而已家語載孔子言曰忠臣之諌君有五義焉一曰譎諌二曰戇諌三曰降諌四曰直諌五曰諷諌惟度主而行吾從其諷諌乎蓋戇諌直諌者皆所謂法語而諷諌降諌譎諌者皆所謂巽與之言也蘇明允之説特異焉以為説之術可以為諌法者五理諭之勢禁之利誘之激怒之隱諷之嗚呼譎諌至於詩降諌至於好貨好色是亦盡矣又有所謂勢禁利誘激怒之説乎凡人聽言理到之言不得不服至於欣然會意雖疏必親然從而不改何貴於從説而不繹滋益甚耳方其未從猶未有以服其心方其未説猶未有以感其心此非人之罪或者吾言之未盡猶有望於他日也從而不改説而不繹是將無所用吾力矣此不特進言於君為然子貢問友子曰忠告而善道之不可則止毋自辱焉忠告者法語之意善道者巽與之意也又一説此一段教學者聽言法人以法語之言來吾安得不從以巽與之言來吾亦安有不悅既從須是改既悅須是繹不然不濟事子曰主忠信毋友不如己者過則勿憚改前輩論主忠信如揚子江中水既入於內外水更不可入此是學者第一義胸中既有所主了然後從益友切磋講磨見得有未是處便改此是學者要切工夫過不必顯然見於事者但萌於吾心者皆當點檢今人多憚於改過反而思之自我作之自我止之譬之出入息也反覆守也開闔戶樞也何難之有子曰三軍可奪帥也匹夫不可奪志也智者可以詐取勇者可以力取無所用吾智力者無所取前輩有言曰兵有符固可奪將有旗固可殺無形之形不可奪矣今人所以抗志不堅者只是迫於威怵於利若不惑於斯二者守死不變世不能使之亂君不能使之辱天能殺之而不能困之子曰衣敝緼袍與衣狐貉者立而不恥者其由也與詩云要之襋之好人服之好人提提宛然左辟佩其象揥維是𥚹心是以為刺蓋矜情於衣服之間此兒女子之事學者苟志于道決不恥於惡衣惡食矣衣敝緼袍與衣狐貉者立而不恥夫子何以獨稱子路蓋古今學者同一病廉潔自將有餘矣視富貴之人若將凂焉褰裳疾去惟恐其不速此其心猶以貧賤富貴為二物也子路衣敝緼袍與衣狐貉者立立字有功而不恥則其視敝袍與狐貉為一略不能入其舍此夫子所以稱之不忮不求何用不藏子路終身誦之子曰是道也何足以臧不忮不求何用不臧與上文不相連此雄雉詩也古人有得人一話一言終身用之不盡者若此類是也若論聖人闔闢功用何啻天淵耶前輩謂懲忿則不忮窒欲則不求若克伐怨欲不行正可為難矣而况於懲忿窒欲乎然而學者不能從事於此二者無一事可成若果能去此亦無一事不可為故曰何用不藏子曰嵗寒然後知松柏之後雕也此一段是論學者得力處人之學問尋常時亦無以異於平人到得失枝落節衆人相顧失色狼狽無措至是口耳俱敗矣從容整暇不動聲色方見學問得力處方春和時凡草木與松柏俱秀及至雪霜切身顔色不變非天下之至剛者不能也子曰知者不惑仁者不憂勇者不懼理明故不惑心靜故不憂氣定故不懼夫多疑者多惑多慮者多憂多恐者多懼其道雖三而行之則一故夫子又曰君子道者三子曰可與共學未可與適道可與適道未可與立可與立未可與權此一段是聖人論教之次第夫取果於自落與未熟才旬日爭耳而色味殊别若時節未到而事欲速成非徒無益而又害之有人於此可與共學可教他涵泳義理知所鄉方然後方指與路頭又須是行矣而著方指與他歇處待得不動不惑方始可論闔闢造化耳唐棣之華偏其反而豈不爾思室是逺而子曰未之思也夫何逺之有此與前段絶不相連全不干權事前輩多引常棣之華解此舊見前輩説云常棣自是常棣今此自是唐棣按陸機注爾雅常棣乃白棣樹也子如櫻桃四月熟正白又有赤棣樹亦似白棣華如刺榆葉而微圓子正赤如郁李而少若夫唐棣爾雅曰栘音移也與常棣兩種前輩以唐棣為常棣故言以常棣之華其華萼相接尋常華是萼承華此華萼承華華覆萼故喻兄弟相與之義偏其反而者華反覆萼也今唐棣自是唐棣則不可用此説按詩有曰何彼穠矣唐棣之華又曰騂騂角弓翩其反矣説者謂唐棣花之美者以譬王姬容色之盛角弓本不當反者緣不能調習遂致翩然而反反喻王者不能以恩懷九族使之多怨猶角弓之反也竊謂唐棣之華四句是逸詩中不合於聖人者聖人刪之曾有此語門弟子記之於此耳詩人之意以為唐棣之華本是容色甚盛今一旦偏然而反有憔悴傾側向下之意大意謂人情始美而終惡也故末云豈不爾思室是逺而人情既惡其室則邇其人甚逺故託言云我非不思直是室逺不可見爾聖人曰世無是理只怕不是真箇思量精誠之極金石可通况於逺乎此雖詩人之辭聖人取此以教學者如學者進道與世間萬事何嘗不如此只怕人無此心耳鄉黨第十孔子於鄉黨恂恂如也似不能言者其在宗廟朝廷便便言唯謹爾朝與下大夫言侃侃如也與上大夫言誾誾如也君在踧踖如也與與如也宗廟之言當在問禮之時朝廷之言當在問政之時便便言如王道便便相似非明辨也君在踧踖如也當承上文不可拆作兩去言君不在時與下大夫言可也及君在惟有敬戒而已君召使擯色勃如也足躩如也揖所與立左右手衣前後襜如也趨進翼如也賔退必復命曰賔不顧矣揖所與立左右手不復俯身君在無私敬也凡兩君來朝與四方之使者大客則擯小客則受其幣而聽其辭所謂擯者姑以諸侯自相為賔禮論之賔主各有副賔副曰介主副曰擯及行人若諸侯自行則介各從其命數謂如侯伯七命則用七人至主國大門外主人及擯出門外相接其擯人數則看主君為多寡若主君是公則擯者五人侯則擯者四人子男則擯者三人所以不從命者示謙也卿為上擯大夫為承擯士為紹擯若擯者五人則用三士為紹餘並一人賔主相鄉介對立主人就擯求辭於客所以求辭者謙不敢當客之來恐其以他事過此求辭之法主人先傳於其上擯上擯傳於次擯次擯傳於末擯末擯乃傳於擯之末介末介傳於上介上介傳於賔賔答主人之辭傳於上介迤邐傳至君之上擯以至於主人此所謂擯相之傳命也何也聘義曰君子於其所尊弗敢質敬之至也既傳命方始入廟門行禮若君使卿來聘禮數則殺於此矣上公之卿只用七介上公自用九介旅擯而不敢交擯旅擯者自擯便傳於介不復如此次第相傳也聘禮稱賔出大夫送于外門外再拜賔不顧注云不顧言去蓋謂賔一去不回顧也聘禮賔不顧擯者便退聖人於不顧後添此一節方為成禮入公門鞠躬如也如不容立不中門行不履閾過位色勃如也足躩如也其言似不足者攝齊升堂鞠躬如也屏氣似不息者出降一等逞顔色怡怡如也沒階趨進翼如也復其位踧踖如也自入公門至過位升堂下階復位禮數如此大抵人臣之事君如子之事父兄為人子者居不主奧坐不中席行不中道立不中門示有尊也則為人臣入公門立豈可中門行豈可履閾愈近君則心愈恭體愈卑故入門過位則言似不足及其升堂則屏氣似不息及出降一等稍逺君矣故顔色怡怡復其位不是來時所過位只是復本位蓋班列之位也執圭鞠躬如也如不勝上如揖下如授勃如戰色足蹜蹜如有循享禮有容色私覿愈愈如也按聘禮使者行之日君揖使者進之上介立于其左接聞命賈人西面坐啓櫝取圭垂繅不起而授宰宰執圭屈繅自公左授使者使者授圭同面垂繅以受命既述命同面授上介上介授圭屈繅出授賈人衆介不從受享束帛加璧受夫人之聘璋享玄纁東帛加琮皆如初遂行舍于郊既至主人几筵于廟迎賔賔及廟門擯者出請命賈人東面坐啓櫝取圭垂繅不起而授上介上介不襲執圭屈繅授賔賔襲執圭擯者入告出辭玉納賔賔入門左既升賔致命主再拜賔三退負序主側襲側獨也受玉于中堂與東楹之間賔出圭側授宰玉聘于夫人用璋如初禮及賔將歸君使卿皮辨還玉于館賔受圭授上介于阼階東鄉復還璋如初入賔既還君進使者使者執圭垂繅北面上介執璋屈繅立于其左反命宰自公左受玉受上介璋致命亦如之右以上是執圭禮聘義云以圭璋聘重禮也已聘而還圭璋此輕財而重禮之義也古者聘必用圭君子以玉比德故藉圭以將意已聘而復還之不敢當盛禮故也儀禮又曰上介執圭如重授賔執圭入門躹躬焉如恐失之賔既授圭出擯者出請擯禓奉束帛加壁享擯者入告出許庭實皮則攝之賔入門左揖讓如初升致命張皮公再拜受皮幣享夫人用琮如初禮將行主使大夫報享夫人亦有報享右以上享禮享獻也既聘而享所以厚恩也禮器云大享其王事與三牲魚臘四海九州之美味籩豆之薦四時之和氣內金示和也束帛加壁尊德也龜為前列先知也金次之見情也丹漆絲纊竹箭與衆共財也其餘無常貨各以其國之所有則致逺物也此諸侯享天子之禮也儀禮又曰及其享發氣焉盈容衆介北面蹌焉容貌舒揚也賔既享畢擯者出請事賔告事畢注云公事畢也賔奉束帛以請覿擯者入告出辭請禮賔賔許既賔禮畢賔覿奉束錦總乘馬二人贊入門右北面奠幣再拜稽首擯出牽馬先入賔奉幣入門以客禮見既畢上介奉束錦士介四人皆奉玉錦束請覿賔既行主使卿贈如覿幣使下大夫贈上介亦如之使士贈衆介如其覿幣右以上是私覿禮也公事既畢私覿於君欲交其歡敬也又有私面之禮私覿既畢賔請有事于大夫庭實設馬乘賔入致幣賔既行大夫親贈如其面幣此之謂私面郊特牲曰朝覲大夫私覿非禮也謂諸侯自相朝覲則卿大夫不當私覿耳儀禮又曰私覿俞俞焉出如舒焉右三事都是説聘禮凡鄉黨所載盡出儀禮與曲禮中故曰曲禮三百威儀三千待其人然後行君子不以紺緅飾紅紫不以為褻服當暑袗絺綌必表而出之注云一入為緅三年練以緅飾衣謹按周禮鍾氏乃云三入為纁五入為緅七入為緇與孔氏注論語不同正義云緅淺綘色也若以周禮論之緅在纁緇之間是近玄色却非淺綘之色既非淺綘之色則非是三年練以此飾衣也不知孔氏何從却以紺為齊服盛色正義乃云紺玄色也正義自知其非故前後異解乃云孔氏以緅為三年練服疑其以縓為緅又云説文紺青赤色也若以緅為纁緇之間乃近齊服紺為青赤之色却近練服未知孰是褻服與褻裘禮記亦有褻味皆言常所服食也正義以為紅紫五方間色皆不用孟子以為惡紫之奪朱然則紅亦奪朱矣必表而出之注疏謂必加上表衣然後出之如此却是絺綌之上加衣不可謂之表也凡衣在上者為表有物加其上者為襲如襲裘者是也今云表而出之則是單衣絺綌裏必有衣也緇衣羔裘素衣麑裘黃衣狐裘禮記玉藻曰君衣狐白裘錦衣以裼之君子狐青裘豹褎玄綃衣以禓之麛裘青豹褎絞衣以禓之羔裘豹飾緇衣以禓之狐裘黃衣以禓之錦衣狐裘諸侯之服也犬羊之裘不禓不文飾也裘之禓也見美也君在則禓盡飾也服之襲也充美也是故尸襲執玉龜襲無事則禓弗敢充也説禮者謂裘上有禓衣禓衣上有襲衣襲衣之上有正服今參按禮家説凡六冕及爵辨無裘先加明衣親身次加中衣冬則次加裘裘上加禓衣禓衣之上加朝服夏則中衣之上不用裘而加葛葛上加朝服即不言襲裘又禮記中亦不曾明言襲裘用何衣故吾以謂有表裘有禓裘有襲裘所謂表裘者以裘露外上不加服也禓裘者上加服但開露裘在外襲裘者即禓裘之服但掩裘在內不開露其美耳表裘最無禮故不入公門禓裘最有禮以其見美故君在則禓惟將重事與弔喪故用襲裘不敢見美故執玉龜襲主人既小斂則子遊襲裘而弔也疏家云緇衣羔裘是諸侯君臣日視朝之服麛裘在國視朔之服卿大夫士亦皆然其受外國聘享亦用之石林云麛裘亦施於親朝祭蠟黃衣狐裘謂大蠟息民之祭服也石林云狐裘亦施於燕居褻裘長短右𬒮聖人亦不敢忘執事之勞學者其可自怠惰乎必有寢衣長一身有半必有寢衣竊意寒暑皆用之故下必字狐貉之厚以居石林曰七月詩云取彼狐狸為公子表然則何獨記於夫子蓋羔裘者朝服也狐裘燕居之服也魯大夫有以朝服弔者故弟子記玄冠羔裘不以弔為正當時大夫豈無有狐裘以朝如檜之所刺乎故門弟子記此為正此説是去喪無所不佩按玉藻云凡帶必有佩玉惟喪否孔子佩象環五寸而綦組綬注禮云凡佩必有左右左佩玉象德右佩木燧火觽之屬此事佩也孔子以象牙為環廣五寸所以然者夫子失魯司冠故謙不復佩德佩示以無德事也竊恐未必然君子無故玉不去身非特是象德所以防間此心如升車聞鸞和爾聖人安得去玉而佩象意者聖人左右佩之外添以象環記禮者載之云爾所不佩者除喪事之外無往而不佩也非帷裳必殺之衣裳之制上曰衣下曰裳不相連綴蓋襞緇為裳狀如今裙矣帷深衣之制衣裳相連被體深邃故謂之深衣所謂殺者交裂而縫之也且以深裳論之其法曰縫齊倍要齊衣之下也如攝齊升堂之齊要是與衣連處裳之上也其齊倍要之數者蓋深衣十有二幅一幅濶二尺二寸以四寸為縫只有一尺六寸交裂之一頭濶尺二寸一頭濶六寸以寬頭盡向下以狹頭盡向上而合縫之此之謂殺深衣本分兩去故有十二幅又如喪制內削幅盡以狹頭向下寬頭向上如裳前四幅後四幅各自為之前後不用連此皆所謂殺也按正義云帷裳者朝祭之服也在下之裳其制正幅如帷名曰帷裳然於禮無明文又據禮疏云或殺而下者謂朝祭之服則朝祭之服固殺矣今檢雜記云其輤音菁有裧昌占反緇布裳帷素錦以為屋士席蒲以為裳輤喪車也裧車飾也裳帷所以帷車也用緇布為之前輩嘗論此為喪車之制然按氓之詩曰淇水湯湯漸車帷裳説者曰以帷裳而障車婦人之車也言女人乘車日涉淇水漸漬其車帷之裳由是觀之非特喪車有裳雖婦人常所乘車亦有之參考前後注疏凡裳必殺此不可易也制獨車裳以正幅為之此門弟子嘗聞夫子論禮及此故耳羔裘玄冠不以弔檀弓載夫子曰始死羔裘玄冠者易之而已羔裘玄冠夫子不以弔蓋羔裘以朝玄冠以祭凡吉事向玄朝服亦是玄冠始死未成服則易去此服用深衣蓋此服可以養病而不治喪主人既成服則亦不當用羔裘玄冠弔之昔季桓子死魯大夫朝服而弔則當時大夫固有失此禮者矣然季武子寢疾蟜固不説齊衰而入見及其喪也曾點倚其門而歌夫固有所為而為之也吉月必朝服而朝玉藻曰天子玄端而朝日於東門之外聽朔於南門之外皮辨以日視朝遂以食卒食玄端而居諸侯玄端以祭禆冕以朝婢支反朝天子也皮辨以聽朔於太廟朝服以日視朝於內朝説者曰天子玄端而朝日諸侯玄端祭端字皆當為冕蓋天子以玄端燕居諸侯以玄端而視朝不應天子却用玄端朝日諸侯却用玄端致祭故改端為冕爾前輩又言有稱玄冕有稱玄冠者有稱玄端者三者不同何也稱玄冕者玄衣而玄冕此祭服也稱玄冠者玄衣而玄冠此燕服也稱玄端者通冠冕言之如玄端朝日與玄端以祭者謂玄冕也如玄端以居內則所謂端韠者謂玄冠也從此説免得改端字為冕按玉藻所言天子聽朔當用玄冠視朝當用皮辨諸侯聽朔當用皮辨視朝當用玄端視朝雖用玄端然玄端素裳者朝服也他玄端裳色不同者非朝服也何謂告朔何謂視朔古者天子告朔于明堂告朔之禮以特牲告于帝如其帝少昊之類及神配以文王武王于時因聽治此月朔之事於明堂謂之聽朔亦謂之視朔行此禮訖復祭于諸廟謂之朝廟又謂之享廟又謂之月祭諸侯受天子之朔於太廟公羊謂受於禰廟以羊告已乃聽朔於廟中已乃祭他廟此告朔聽朔之禮也又按玉藻載孔子曰朝服而朝卒朔然後服之據此而言竊意諸侯聽朔於廟不敢朝廟羣臣聽朔朝廟既畢視朝於內朝始也諸侯與羣臣在朝俱服皮辨及其退而視朝釋皮辨而服朝服君臣皆然故曰朝服而卒朔然後服之魯自文公不視朝之後此禮浸廢夫子從大夫之後嘗有位於朝不敢廢此禮固不必問其君之行禮與已之退休也故曰必朝服而朝齊必有明衣布前輩多舉明水火事説明衣凡祭祀所用皆稱明取其明潔也然而朝服亦有明衣是説不可用也所謂必有明衣者齊之明衣不與常所用明衣混齊固别有明衣獨齊則衣之爾所謂衣布者以布為之衣固當用布而曰明衣布者當時必有以純為之者矣夫子嘗曰麻冕禮也今也純儉吾從衆古者冕皆用麻至孔子時乃去麻用純然郊冕猶用麻所以示復本也衣者古明衣用布至後世改用純齊之明衣猶用布豈不如郊冕之猶用麻乎齊必變食居必遷坐此兩句當作一段説不可拆總言齊事也按莊子舉顔子云回家貧不飲酒不茹葷數月矣夫子曰此祭祀之齋非心齋也由是觀之則古者祭祀之齋亦不飲酒茹葷故曰齋必變食然周禮載玉食一舉注殺牲盛饌曰舉王齋日三舉注云齋必變食豈天子之禮固與卿大夫士不同乎居必遷坐者禮記稱非致齋也非疾也不晝夜居於內則知君子平居晝處外食處內獨致齋則晝夜居於內此居必遷坐也食不厭精膾不厭細食饐而餲魚餒而肉敗不食色惡不食臭惡不食失飪不食不時不食易於頤卦説謹言語節飲食蓋頤為口禍之門也其出於口者可以招禍其入於口者可以生疾故聖人於頤致戒焉厭猶屬厭之厭不以其精細而屬厭此所謂食無求飽之意也割不正不食古者割牲皆有正數肱骨三肩臂臑也股骨三肥音純胳古百切觳也脊骨三正脊也脡脊也橫脊也燕有折爼所謂殽脀也割不正謂不合正數也不得其醬不食醬者臡醢齊爼之總名也其法用魚肉莝之雜以麴漬以美酒為之至如韭葅之屬亦以醯醢雜之方成其醢醬用以調和飲食其味鹹凡進食之禮以醯醬處右所謂醯醬者以醯和醬也賔每飲以肴擩人悅反染也醬而食之故公食大夫禮宰夫自東房授醯醬公設之賔三飯以湆醬注云湆汁也啜湆以肴擩醬食正饌也三飲訖徹醬食庶羞也故炙亦無醬不得其醬不食謂所食之醬各有所宜若濡雞醢醬之類謂調和也魚膾芥醬之類謂配食也注云醬饌本也又云飲食之主也肉雖多不使勝食氣唯酒無量不及亂沽酒市脯不食孟子曰雞豚狗彘之畜無失其時老者可以食肉矣禮記以為酒者所以養老疾也然則酒肉固為老疾設也聖人之御酒肉自節約若此學者可不知所戒哉觀周禮食醬與禮記內則所載聖人為是君親飲食之節詳矣獨不可以自奉爾古人相見以脯修故人多自有曲禮曰以脯修置者左朐右末不撤薑食不多食檀弓曰喪有疾飲酒食肉必有草木之滋焉以為薑桂之謂也蓋喪有疾不得已而飲酒食肉意在滋味必以薑桂亂之不撤薑食豈其薄滋味之謂乎祭於公不宿肉祭肉不出三日出三日不食之矣祭於公不宿肉竊意此兩句謂君賜祭肉於助祭之臣也祭肉不出三日出三日不食之矣此謂夫子受君之賜也孟子稱夫子從而祭燔肉不至不稅冕而行以此知從祭既退膰肉繼至所謂祭於公不宿肉也夫子拜君之賜必須自食之如君賜食必正席先嘗之之類食之有餘必須三兩日間食之若出三日方始不食耳此受君之福又非他賜比也食不語寢不言不觀曲禮玉藻少儀無以見鄉黨當相兼看之觀曲禮所載毋摶飯毋放飯毋流啜毋吒食登城不指城上不呼將上堂聲必揚車上不廣咳不妄指古人於飲食言語之間其不敢輕也如此而况於聖人乎雖蔬食菜羮瓜祭必齊如也古者遇食而必祭除水漿不祭外飲食脯醢之類皆祭肉必祭肺魚必祭膴大臠也瓜祭上環而食其中當其祭時以其恍惚以與神明交安得不敬蓋聖人之制祀也實有是事故有是禮非姑曰如是焉耳詩云匪且有且席不正不坐古者肆筵設席於地席濶三尺三寸有奇每一席坐四人天子諸侯而下重數不同席不常設尊者有所往則童子奉席而從客至則為席若飲食之席則不對設非飲食之席則對席席間函丈席東鄉西鄉則以南方為上南鄉北鄉則以西方為上蓋共坐則以席端為上獨坐則以席中為尊尊者宜獨坐故常居中若有五人則長者必異席卑者侍坐於所尊必退席謂在尊者席之旁也敬毋餘席蓋侵席端而坐不使席端有餘敬之至也其升席也不自前不自上摳衣趨隅由下而升其降也自前曲禮所謂毋踖席玉藻所謂登席不由前為躐席者是也若虛坐盡向後不害玉藻所謂徒坐不盡席尺是也若食坐盡當向前玉藻所謂讀書食則齊豆去席尺是也若弟子有問當避席負牆而立為人子者坐不中席為有尊也父子不當同席男女不當同席雖姑姊妹女子子已嫁而反兄弟不與同席而坐有喪者當専席而坐説者曰専單也單席謂不重席也有憂者側席而坐説者曰側獨也獨席謂不舒他面席也鄉人飲酒杖者出斯出矣鄉人飲酒非鄉飲酒禮是鄰里嵗時自相聚會之禮也六十杖於鄉則杖者固六十以上矣大率相聚會少者之禮當先往後罷漢書地理注云魯濵洙泗之間其民涉渡幼者扶老者而代其任俗薄長老不自安而與幼者相讓故孔子嘆曰甚矣魯道之衰也洙泗之間齗齗如也禮義興行幼者扶老而老者安之逮其踧踖不安而俗薄矣此聖人之所嘆也鄉人儺朝服而立於阼階案月令季春之月曰命國難九門磔禳以畢春氣仲秋之月曰天子乃難以達秋氣季冬之月曰命有司大難旁磔出土中以送寒氣説者曰季春之難難隂氣也是月也日行厯昂昂有大陵積尸之氣氣佚則厲鬼隨而出命方相氏帥百𨽻驅疫以逐之仲秋之難難陽氣也是月宿直昴亦有大陵星名主尸氣積尸之氣故也季冬之難難隂氣也是月也日厯虛危有墳墓四句星名之氣為厲鬼將隨強隂出害人也季冬之月言大難者蓋季春惟國家之難通及諸侯仲秋惟天子之難至於季冬下及庶人故謂之大難今論語所稱鄉人儺者是季冬大儺也然則世固有厲乎昔禹鑄九鼎象物而為之備使民入山林魑魅魍魎莫能逢之君臨臣喪以巫祝桃茢祓除其不祥夫固有是理也但聖人在上鬼有所歸乃不為厲絶地天通勿使降格如斯而已禮記曰鄉人禓音傷孔子朝服立于阼存室神也大夫用朝服祭故以祭服存其神問人於他邦再拜而送之問人於他邦不必盡用苞苴簞笥之屬凡言語皆通問也謝上蔡云若於同國則不必拜也此所謂疏數中禮今人不問逺近例言再拜康子餽藥拜而受之曰丘未達不敢嘗古者大夫有賜於士則拜受於家不在則往拜其門康子使人餽藥夫子拜受禮也正義云凡受人餽遺可食之物必先嘗而後謝之則夫子未嘗而謝之矣聖人所謹齋戰疾醫不三世不服其藥蓋重之也孟子云大夫有賜於士不得受於其家則往拜其門注云陽虎恐夫子便答使人故瞰亡而餽之玉藻云大夫親賜士士拜受又拜於其室敵者不在拜於其室以此知大夫雖不親賜士士若不在亦往拜其室敵者若是朋友亦不拜故曰朋友之餽雖車馬非祭肉不拜廏焚子退朝曰傷人乎不問馬按正義云廏焚者夫子家廄也王弼云公廄也家語云孔子為大司冦國廄焚子退朝而之火所鄉人有為火來者則拜之子貢曰敢問何也孔子曰其來亦相弔之道也吾為有司故拜之以此知是公廄不問馬弟子記所見云爾其實聖人所重在人故不暇問馬亦不是有意分别人畜帷蓋及犬馬聖人於一物亦懼傷之或云傷人乎者春秋新延廄之意非也君賜食必正席先嘗之君賜腥必熟而薦之君賜生必畜之玉藻曰君賜車馬乘以拜賜衣服服以拜賜君未有命弗敢即乘服也酒肉之賜弗再拜所謂再拜者既拜受於家又往拜於君以此知若車馬衣服之賜非有君命弗敢即乘服若君命之即乘服以拜於君所如酒肉則遂拜受熟則先嘗之腥則熟嘗之生則畜之不復再拜於君所也侍食於君君祭先飯玉藻曰若賜之食而君客之則命之祭然後祭先飯辨遍字嘗羞飲而俟若有嘗羞者俟君之食然後食飯飲而俟又曰侍食於先生異爵者後祭先飯説者曰祭者祭先也禮敵者共食則先祭若降等之客則後祭若臣侍君而賜之食則不祭若賜食而君以客禮待之則得祭又須君先命之祭後乃敢祭也先飯辨嘗羞者飯食也謂君未食而臣先食遍嘗羞膳此忠孝之至猶嘗藥之意也飲而俟者禮食未飱必前啜飲以利滑喉中君既未飱臣嘗羞畢啜飲以俟君飱臣乃敢飱耳若有嘗羞者謂别已有嘗羞之人則吾不得祭亦不得嘗羞但飯飲以俟君食畢然後食耳所謂侍食於先生異爵者謂先生與異爵之人皆吾所敬也故後主人所祭若敵體則主人延客先祭先飯者亦為尊者嘗食也以此侍食於君君祭先飯者是君不以客禮賜食之時當君之祭而聖人先飯辨嘗羞矣疾君視之東首加朝服拖紳夫禮雖先王未之有可以義起疾病而見君其禮如此夫子嘗行之矣力疾輿見扶掖不拜後世之禮亦有可用者君命召不俟駕行矣父召無諾之意言其至速也以吾從大夫之後不可徒行此言常禮也朋友死無所歸曰於我殯子夏問於孔子曰客至無所舍而夫子曰生於我乎館客死無所殯夫子曰於我乎殯敢問禮與仁者之心歟孔子曰吾聞諸老𥅆曰館人使若有之惡有之而不得殯乎以此知朋友死無所歸於我殯非所以為仁亦非所以為禮也赤子匍匐將入井趨而救之非所以內交於孺子之父母亦非要譽於鄉黨朋友而然也古者見人弗能館不問其所舍既館矣則當以同室待之爾朋友之餽雖車馬非祭肉不拜大抵尊者之賜無有不拜受者雖物之微者必拜大夫有賜於士士不得拜於其家則往拜其門獨朋友是敵體故不必拜若拜則過乎禮矣惟祭肉則拜其先祖之賜爾寢不尸居不容此學者觀聖人於寢處之間其詳如此亦只是自然中禮故純熟如一玉藻曰君子之容舒遲見所尊者齊遫足容重手容恭目容端口容止聲容靜頭容直氣容肅立容德色容莊坐如尸燕居告溫溫聲氣容色頭目手足皆有自然之容學者學此賢者守此聖人忘此居不容者言無事乎此也所謂燕居告溫溫也見齊衰者雖狎必變見冕者與瞽者雖褻必以貌人多言輕賁此非聖人之論也貴貴為其近於君也貴而冕賤而瞽聖人曷嘗二其心哉變則為之動心矣凶服者式之式負版者孝子衰服之外前有衰長六寸博四寸廣袤當心左右有辟領廣四寸出於衰後有負版在背上廣出於辟領一寸言孝子哀戚無所不在也前輩云式負版者謂喪服也雖曰凶者式之然止式負版者雖緦功之類固不式也有盛饌必變色而作進食之禮客必祭主人辭曰不足祭也祭者盛主人之饌辭者言非盛也客飱主人辭以疏然孔子食於季氏不辭不食肉而飱者以其待已及饌非禮也有盛饌必變色而作者謙不敢當也所謂客若降等執食興辭之類是也然御同於長者雖二不辭偶坐不辭謂其盛饌不由已不敢辭也迅雷風烈必變玉藻曰若有疾風迅雷至則必變雖夜必興衣服冠而坐所謂變者如此昔者天大雷以風成王與羣臣盡辨以啓金縢之書蓋天威非常天子當自察其天下諸侯卿大夫當自察其國家士庶人當自察其身升車必正立執綏車中不內顧不疾言不親指周禮保氏有祭祀之容車馬之容此所謂車馬之容也曲禮曰凡僕人之禮必授人綏若僕者降等則受不能則否綏挽而上車之索也又曰車上不廣咳不妄指立視五雋式視馬尾顧不過轂國中以策彗恤勿驅塵不出軌皆謂其驚衆也此與城上不呼同意色斯舉矣翔而後集曰山梁雌雉時哉時哉子路共之三嗅而作此兩句是題目聖人偶見山梁之雉知時如此故不覺興嘆子路共之共讀如恭字周禮所謂共王膳羞之類是也子路所共未必是聖人所嘆之雉蓋古人士以雉為贄是以子路得有此為聖人之共蓋色斯舉矣與翔而後集聖人有見於雉如此而子路未必知徒聞聖人之嘆耳退而共之亦不必是錯會聖人之意蓋自見雉而獻猶古人食芹獻君之意耳三嗅者示不逆其意至於不食則聖人固不忍於此也先進第十一子曰先進於禮樂野人也後進於禮樂君子也如用之則吾從先進先進依明道先生説先進猶前輩後進猶晚進也言前輩於禮樂如進趨揖遜之類大率朴野後生於禮樂皆楚楚可觀所謂君子猶今言士大夫也如孟子無君子莫治野人之類是也若吾輩用此只得從前輩耳此一段不是言周時文弊聖人有意救弊如此且如今世前輩做事大率近厚吾輩有所欲為亦須依倣前輩可也子曰從我於陳蔡者皆不及門也德行顔淵閔子騫冉伯牛仲弓言語宰我子貢政事冉有季路文學子遊子夏子曰回也非助我者也於吾言無所不説吾與回言終日不違如愚退而省其私亦足以發此是聖人檢察顔回處回也非助我者也於吾言無所不説此是聖人自檢察處苟非聖賢言無從違應答如響大有害理處子曰孝哉閔子騫人不間於其父母昆弟之言孝哉閔子騫此一語國人於其父母昆弟同然一辭故曰人不間於其父母昆弟之言所謂州閭鄉黨稱孝之類是也閔子之孝世言衣單事公羊載一事極好曰古者臣有大喪則君三年不呼其門已練可以辨冕服金革之事君使之非也臣行之禮也閔子要絰而服事既而曰若此乎古之道不即人心退而致仕君子蓋善之也南容三復白圭孔子以其兄之子妻之亂之作也言語以為階故禍患之來未有不出於多言者三復白圭宜乎其免於刑戮也季康子問弟子孰為好學孔子對曰有顔回者好學不幸短命死矣今也則亡魯哀公季康子問弟子好學亦未必知好學之為難也聖人則不當輕以好學許人前輩有云顔回絶好學萬世之下實難其人顔淵死顔路請子之車以為之槨子曰才不才亦各言其子也鯉也死有棺而無椁吾不徒行以為之槨以吾從大夫之後不可徒行也事當問輕重若始死未有棺斂之具則師友當有共財之義不論朋友雖鄉黨所知皆然若葬而無椁此事却可省蓋喪稱家之有亡斂手足形還葬而無椁稱其財斯之謂禮若有可以取具之資而不用是為廢禮萬一貧無以為葬至於假貸於人費力而為之則決不可蓋不特喪禮凡事當如此今世又有賢者急於濟人不愛其力此誠可以為法然須從內起要須是自家父母兄弟妻子與親戚鄉黨先盡其心矣而後推其餘以及人此所謂施由親始也顔淵死子曰噫天喪豫天喪豫古者聖賢出而行道必賴其徒相與輔佐之故曰無其徒弗能也天之始生聖人也又有顔淵子路羣弟子為之佐則似有意於斯世者己而顔淵子路皆死則天之無意於斯世也明矣顔淵之死非喪顔淵也喪夫子也非喪夫子也喪斯文也子路死子曰噫天祝豫聖人平日所以待子路者無一事假借之及其既死痛恨若此乃知平日警䇿之力正所以成就之將與之共斯世也顔淵死子哭之慟從者曰子慟矣曰有慟乎非夫人之為慟而誰為古者親戚故舊死哭於其家有來弔者則拜之故師哭諸寢朋友哭諸寢門之外所知哭諸野妻之兄弟為父後者死哭之適室故子路死夫子哭於中庭有人弔者而夫子拜之顔淵死夫子哭之慟而不知與夫子適衛遇於一哀而出涕乃知哭死而哀非為生者縣子曰哭有二道有愛而哭之有畏而哭之古者制禮以稱情後世乃抑情以從禮所謂禮者忠信之薄其有見於末世之禮乎顔淵死門人欲厚葬之子曰不可門人厚葬之子曰回也視豫猶父也豫不得視猶子也非我也夫二三子也豫不得視猶子者謂其葬也不得如伯魚此則門人之故也然則夫子之言亦不行於門人乎此無他見義不明欲以申朋友之愛而不知其非義也故嘗謂顔淵死門人厚葬曾子寢疾曾元不欲易簀子路有姊喪而弗除伯魚之母死期而猶哭門人葬夫子三斬板而已封與子路請禱使門人為臣夫子死門人以有若似夫子欲以所事孔子事之凡此類其意皆以善為之而不知其非義如伯魚死聖人不徒行以為之椁顔淵之喪餽祥肉入彈琴而後食之其喪顔子也若喪子而無服喪子路亦然皆是聖人斷制以義處門人中如曾子執親之喪水漿不入口者七日子貢反築室於場獨居叁年然後歸可敬而不可及也季路問事鬼神子曰未能事人焉能事鬼曰敢問死曰未知生焉知死夫子何以知子路未能事人若能事人定能事鬼神何以知子路未知生若能知生定能知死不復來問矣人事不盡而曰可以事鬼神此身不自知而曰知死皆欺也閔子侍側誾誾如也子路行行如也冉有子貢侃侃如也子樂若由也不得其死然門弟子在聖人之側各隨其氣質之剛柔學問之深淺自見於容色之間蓋所謂天機自動也前輩説子樂謂夫子於羣弟子中氣象不可形容但知其和樂爾當用此説若説羣弟子侍側氣象如此而夫子樂則子路之行行聖人固憂之何樂之云若由也不得其死然亦非夫子語是門弟子記一時之事蓋行行兩字未足以盡子路氣象故終之曰若由也不得其死然深言其行行之甚也魯人為長府閔子騫曰仍舊貫如之何何必改作子曰夫人不言言必有中案左傳昭公二十五年昭公欲逐季氏居于長府注云官府名九月戊戌季氏殺公之于門遂入之竊意季氏惡昭公欲改為長府有伐木削迹之意故閔子騫有此語曰仍舊貫如之何又何必改作是自彰其惡也故夫子曰夫人不言言必有中所謂有中者謂深中季氏之失也此事甚隱惟閔子與聖人知此意故相與嘆息爾案左傳定公元年六月昭公之喪至自乾侯戊辰公即位季孫使役如闞公氏將溝焉闞者魯羣公墓所在也季孫惡昭公欲溝絶其兆域不使與先君同榮駕鵝曰生不能事死又離之以自旌也縱子忍之後必或耻之乃止季孫問於榮駕鵝曰吾欲為君諡使子孫知之對曰生弗能事死又惡之以自信焉用之乃止秋七月癸巳葬昭公於墓道南孔子之為司冦也溝而合諸墓昭公出故季平日禱于煬公九月立煬宫推此事觀之則魯之欲改為長府容有此理閔子騫之意榮駕鵝之意但榮駕鵝顯而言之閔子騫隱言之爾子曰由之瑟奚為於丘之門門人不敬子路子曰由也升堂矣未入於室也按家語子路鼓瑟孔子聞之謂冉有曰甚矣由之不才也夫先王之制音也奏中聲以為節流入於南不歸於北由今也匹夫之徒曾無意於先王之制而習亡國之聲豈能保其七尺之體哉冉有以告子路子路懼而自悔靜思不食以至骨立夫子曰過而能改其進己矣由此觀之由之瑟奚為於丘之門者當是有殺伐之氣習為亡國之聲故夫子罪之由也升堂未入於室者是靜思改過之後也子貢問師與商也孰賢子曰師也過商也不及曰然則師愈與子曰過猶不及學不至於變氣質縱有學問隨其氣質自為成就終墮於一偏子張之過子夏之不及皆是隨氣質成就如此往往門人中不特子貢以為子張勝於子夏大抵皆有此論獨聖人知其然天下事不當問其資質或生而知之或困而知之及其知之一也若資質雖美不到極處與資質不美者相去幾何是所謂五十步笑百步也何况過與不及其資質亦無以大相過隨其所到等為不中耳聖人之門若子張子夏大率議論行事都相反至此雖子貢亦不免以為疑子夏既除喪而見豫之琴和之而不和彈之而不成聲作而曰哀未忘也先王制禮弗敢過也子張既除喪而見與之琴和之而和彈之而成聲作而曰先王制禮不敢不至焉二公所行亦皆有理皆當於聖人之意而卒不免於偏者謂其立意一定非所謂時中也子夏之門人問交於子張子張曰子夏云何對曰子夏曰可者與之其不可者拒之子張曰異乎吾所聞君子尊賢而容衆嘉善而矜不能二公所言亦不叛於聖人之論只緣是執定一説以為必然故也大率子夏之論多循循然懼違規矩而子張之論大率展托開廣學者觀二子之得失可以自省矣季氏富於周公而求也為之聚斂而附益之子曰非吾徒也小子鳴鼓而攻之可也按左氏哀公十一年季孫欲用田賦使冉有訪諸仲尼曰丘不識也三發卒曰子為國老待子而行若之何子之不言也仲尼不答而私於冉有曰且子季孫若欲行而法則周公之典在若欲苟而行之又何訪焉弗聽論語所載蓋謂此也言周公之典具在季氏取民已富於周公而冉有助季氏用田賦孟子所謂賦倍於他日是也門人之中有小過者聖人亦優容之謂其猶是學者之過若出於聖人之門而為人聚斂是真非學者所當為其全體都是别人鳴鼓而攻之何不可之有柴也愚參也魯師也辟由也唁子曰回也其庶乎屢空賜不受命而貨殖焉億則屢中愚與魯何以異愚則有所不曉魯雖曉而鈍禮記有敖辟之辟則辟者堂堂之失也吕博士曰唁者俗學也傳稱唁者俗論也今按夏諺字從言此從口不同唁與唁同謝曰唁則禦人以口給此説恐然所謂惡夫佞者謂其以口給禦人也或謂四子資質愚魯者可以入道亦未必然只看學問何如耳苟至於變氣質四者所到一也若猶未能隨其分量皆有害道處四子之中若曾子可謂能變氣質矣平生魯鈍如此一唯之對天下之敏亦無過於此矣若三子者亦大得學問之力如高柴執親之喪此人子至難也不死於衛之難不可謂愚子張書紳之事亦不甚辟子路悔過骨立亦不甚唁子路平生勇鋭至死時却從容回也其庶乎正所謂顔氏之子其殆庶幾也屢空者非謂有時而不空也回忘仁義是謂空矣回忘禮樂則又空矣此之謂屢空謂其此處用功不一二而止也賜不受命非所謂天命之命謂其不受聖人之命猶韓退之所謂籍湜輩屢指教未知能不叛去之類是也貨殖者多學而識之之意也億則屢中非方人之謂謂其以聞見之私窺測聖人之道雖時見一二而不知其大全終是億度來也夫子嘗曰賜也汝以為多學而識之者歟對曰然非歟所謂然與非歟者即所謂億也子張問善人之道子曰不踐迹亦不入於室夫子嘗曰聖人吾不得而見之矣得見君子者斯可矣善人吾不得而見之得見有常者斯可矣今子張問善人之道蓋謂聖人之道逺而難及故思其次亦猶冉求公孫丑之意也聖人答之曰天下之事不問小大無有一蹴而至者善人之道雖曰易致不踐其迹亦不能到其深奧處若移此功用力於其上者成就豈可量哉子曰論篤是與君子者乎色莊者乎論篤者謂議論之的確者也今人泛然為論則是非曲直特未定也若論到的實處是非曲直一毫不差不待辨而明矣的實之論是與君子是與色莊識者必有以知之矣子路問聞斯行諸子曰有父兄在如之何其聞斯行之冉有問聞斯行諸子曰聞斯行之公西華曰由也問聞斯行諸子曰有父兄在求也問聞斯行諸子曰聞斯行之赤也惑敢問子曰求也退故進之由也兼人故退之前輩謂一番疑是學者一番進此語極好聖人之門造化人才處正在此善學者於此察之則思過半矣聞斯行諸不必謂聞道但事事如此大抵事當先聞於父兄然舜有不告而娶之事此之謂時中子畏於匡顔淵後子曰吾以女為死矣曰子在回何敢死大抵處死當有道處患難之際豈有敢死之義順受其正而已若君父在患難義苟當死奮身不顧敢死可也今匡人之圍雖與夫子同處患難而夫子無恙是義不當死也回也又安敢違義而敢死乎季子然問仲由冉求可謂大臣歟子曰吾以子為異之問曾由與求之問所謂大臣者以道事君不可則止今由與求也可謂具臣矣曰然則從之者與子曰弒父與君亦不從也天下之大逆苟非窮凶極惡之人皆自知免冉有子路孔門之高弟何至曰弒父與君亦不從也竊謂此言為季子然發也夫季子然者季孫意如之子意如親逐昭公死于外是可為也孰不可為也聖人此言深折姦心而破其膽所謂春秋成而亂臣賊子懼也然由求二子豈為無罪八佾之舞泰山之祭伐顓臾用田賦此篡弒之漸也二子不能力爭而左右之此其意以謂是小事耳不足致死力夫豈知聖人事事不放過者是乃所以遏絶亂源也子路使子羔為費宰子曰賊夫人之子子路曰有民人焉有社稷焉何必讀書然後為學子曰是故惡夫佞者此一段多引子皮使尹何為邑事證是固然矣然其間又有説人多言高柴愚恐不可從政然吾視季羔為衛之士師刖人之足俄而衛有蒯瞶之亂走至郭門刖者守門而脫之季羔問曰吾親刖子之足今吾在難此正報怨之時而逃我三者何故哉刖者曰曩者君治臣以法令先人後臣欲臣之免也愀然不樂見君顔色臣又知之以此觀之則子羔固善從政者此一事固在子路使子羔為費宰後然推此類考之子羔亦不可謂之愚也竊謂費季氏之邑為費宰固季氏所親信之臣也以子路之果冉有之藝猶陷溺於季氏若使子羔而為季氏宰使不從季氏則必得罪於季氏矣故曰賊夫人之子子路不悟此意直與夫子論學夫讀書固未必便是學然不讀書直於社稷人民上學莫誤人否聖人之意子路已失之故不暇與之論是非曲直曰是故惡夫佞者謂其不聽人説話一向用口給禦人且是教訓不入也子路曾晳冉有公西華侍坐子曰以吾一日長乎爾毋吾以也居則曰不吾知也如或知爾則何以哉子路率爾而對曰千乘之國攝乎大國之間加之以師旅因之以飢饉由也為之比及三年可使有勇且知方也夫子哂之求爾何如對曰方六七十如五六十求也為之比及三年可使足民如其禮樂以俟君子赤爾何如對曰非曰能之願學焉宗廟之事如會同端章甫願為小相焉點爾何如鼓瑟希鏗爾舍瑟而作對曰異乎三子者之撰子曰何傷乎亦各言其志也曰暮春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸夫子喟然嘆曰吾與點也三子者出曾晳後曾晳曰夫三子者之言何如子曰亦各言其志也巳矣曰夫子何哂由也曰為國以禮其言不讓是故哂之唯求則非邦也與安見方六七十如五六十而非邦也者唯赤則非邦也與宗廟會同非諸侯而何赤也為之小孰能為之大此一段見得古之學者平居志向在此他日施設亦在此如虞廷諸公明刑明禮皆専掌一職終身不易却不比後之學者事事不學待出來仕宦事事要做臨末事事都敗可見得古之學者不敢自欺量度自家才質各有用於世分毫不敢過説又見得孔門中宗廟之美百官之富莫不皆在然不曾用此為大事且道秦漢以來有一人如子路當千乘之寄介于強國之間又承飢饉喪亂之後兩三年間可使有勇又復知義可是人才功業在聖門中更看不見聖人聞此亦付之一笑而已聖人所以哂子路者不是道他做不得所以與曾點者亦不是道他便做得聖人之意深逺學者不能測也天下事固是擔當在我然事亦有不可必者子路如何便道我必能如此看他意思便有將智力劫持之意且如冉求公西赤亦是説輔佐諸侯事業何以言之安有方六七十如五六十而非諸侯之國者宗廟會同而非諸侯之事者但二子不敢分明説著不比子路便説千乘之國將諸侯事業便擔當在身上大是不委曲也又如曾點所言前輩謂便是堯舜氣象固是如此然亦不必太深言之聖人所以喟然者正是有感於其心未暇論曾點也道之不行便是得如子路諸子各行其志亦無復以利澤生民退而與二三子自樂其樂亦復不得已之意此聖人所以喟然也其實諸子優劣亦難専用此看聖人亦不就上面責他觀亦各言其志一句聖人忠恕之意亦可見觀曾點異乎三子者之撰與三子之言何如意思都與聖人别顔淵第十二顔淵問仁子曰克已復禮為仁一日克巳復禮天下歸仁焉為人由已而由人乎哉顔淵曰請問其目子曰非禮勿視非禮勿聽非禮勿言非禮勿動顔淵曰回雖不敏請事斯語矣學者始乎禮成乎禮何謂始乎禮夫子所謂約我以禮非禮勿視聽言動是也何謂成乎禮夫子所謂克己復禮天下歸仁孟子所謂動容周旋中禮者是也蓋學者初於何下手禮乃其入門也及其成也他何所見只有動容周旋中禮而已克己復禮只此便是為仁故曰克已復禮為仁克已不是一日工夫到得復禮却是一日夫克已復禮所以為仁者向時私欲未克則此身方為吾纍何况於物到得一日克盡復歸於禮昭徹無礙别無一物但見天下都在仁中此身與萬物皆在泰和之中故曰天下歸仁焉為仁由已此親切極盡之辭也非禮勿視非禮勿聽此克巳之要道也外此聖人教人無它道矣仲弓問仁子曰出門如見大賔使民如承大祭己所不欲勿施於人在邦無怨在家無怨仲弓曰雍雖不敏請事斯語矣張范陽以己所不欲勿施於人連上説謂傲慢不敬彼已皆有所不堪故不敢以不敬加諸人此説亦新然亦不用太奇在邦無怨在家無怨不必説己怨只是人怨無已怨易無人怨難若能用力於此律已甚嚴與人甚恕暴慢之氣不設於身體則心平氣和與物無忤持此道也在彼無惡在此無射所謂篤恭而天下平也出門如見大賔而下視克已復禮在邦無怨而下視天下歸仁雖功用有淺深然其用功於克己則一而已矣司馬牛問仁子曰仁者其言也訒曰其言也訒斯謂之仁已乎子曰為之難言之得無訒乎仁者其言也訒猶孟子所謂浩然之氣難言也司馬牛不識此意指其言也訒為求仁之方故夫子答之曰為之難言之得無訒乎所謂言之者指仁言之也然則夫子何以不答司馬牛之問仁前輩謂司馬牛多言而躁即此語乃是教之入門也司馬牛問君子子曰君子不憂不懼曰不憂不懼斯謂之君子已乎子曰內省不疚夫何憂何懼君子不憂不懼所對亦如前謂君子能不憂不懼非謂自不憂不懼求為君子司馬牛依舊不識此意却不知內省不疚大段用功來是恁次第人也張范陽謂司馬牛雖能憂其兄之將亂未能內省不疚所謂不疚者直是區處得君父兄弟之間皆無病乃好徒然憂懼濟恁事司馬牛憂曰人皆有兄弟我獨亡子夏曰商聞之矣死生有命富貴在天君子敬而無失與人恭而有禮四海之內皆兄弟也君子何患乎無兄弟也今參考左氏傳司馬牛之兄弟往往皆不賢而魋特甚耳不特魋一人也司馬牛之憂不是為魋慮也乃見兄弟如此憂禍及焉使向氏絶祀于宋身死族滅者非兄弟之故耶子夏寬譬之曰死生有命富貴在天果使向氏因魋絶祀而身死滅絶是固天命也雖憂何益果天命不至此則父子兄弟罪不相及伯棼之亂而子文不乏祀叔虎之惡而叔向不及禍又何憂焉但行吾敬與物無忤政復違之他邦以辟其亂四海之內固有知我者矣昔季友適陳以辟慶父之亂君子美之而又何憂焉事到難區處時若見得分明以順境行之亦不至撓亂其心徒然憂惱無益也然子夏亦只是説得喪明之事可見子張問明子曰浸潤之譛膚受之訴不行焉可謂明也己矣浸潤之譖膚受之訴不行焉可謂逺也已矣子張異時以聞為達今日安知不以察為明故夫子以逺告之所以再言者蓋謂一兩番不行未足以見其明久久無隙可行是真不行矣此所謂逺也不行非是説了不行是不敢來説蓋人有此意不敢行己絶之於冥冥中矣子貢問政子曰足食足兵民信之矣子貢曰必不得已而去於斯三者何先曰去兵子貢曰必不得已而去於斯二者何先曰去食自古皆有死民無信不立聖人只作兩件事説子貢却作三件事問聖人大意以為足食足兵信行於中故曰民信之矣蓋聖人之制井地以足食丘賦以足兵外此一毫不敢過也如此則上下相信患難不相背負子貢之意大要以為若到急迫不得已處只得權冝濟事如前輩所謂諸道以兵興加賦為辭又權暫籍民為兵事則信似可去聖人以為決不可去者却不是迂濶乃是親切事機若使上下相信死生不相背便是兵不足亦無大害古人固有一旅中興者又如食不足亦怎奈何拚著一死却無後患遺禍若使上下不相信兵食雖足反為亂資是不能一朝居也何况守信之人正雖食不足亦未有必死之理觀莊王圍宋華元告急事有信而無食亦未必死也棘子成曰君子質而已矣何以文為子貢曰惜乎夫子之説君子也駟不及舌文猶質也質猶文也虎豹之鞟猶犬羊之鞟棘子成之意未必不善但説得不圓且如夫子之説禮與其奢也寧儉亦有此意但不如棘子成之實也子貢曰惜乎夫子之説君子謂下君子兩字誤子若只説人亦質而己矣固未甚害但不合實説君子却不得蓋既説君子則不當獨説質也若説文與質相似是虎豹之鞟猶犬羊之鞟也其可乎哀公問於有若曰年飢用不足如之何有若對曰盍徹乎曰二吾猶不足如之何其徹也對曰百姓足君孰與不足百姓不足君孰與足説者謂有若對哀公事與所問無交涉當年飢闕用之時乃泛論平世之法真似迂濶者不知此乃至親切之對也但哀公以年飢之故憂國有若以年飢之故先憂民爾夫憂民正是憂國也蓋先王以荒政十有二聚萬民一曰散利二曰薄征此乃救荒急切之政若凶嵗不薄征民力無從出只得流移或去為盜賊古所謂飢饉喪亂者正如此當此時國用於何取足却不知一時薄征民略可以自安必不流移嵗月之間禾麥既登則國用取足是豈非所謂百姓足君孰與不足之説乎學者讀此不當認有若意錯以為論平世之法有若豈不知魯賦已重一旦其君有年飢之問而對以平世不切之談乎蓋曰目今如欲救飢且減作十一之賦可少延以待其後固未暇論平世也子張問崇德辨惑子曰主忠信徙義崇德也愛之欲其生惡之欲其死既欲其生又欲其死是惑也誠不以富亦祇以異古之人舉詩只取其意不論其事誠不以富亦祇以異此我行其野詩也聖人取以為辨惑之説亦取其意也蓋人之所以惑者是有所蔽也外間道理極分明中間溺於私情不能自克徒然擾擾真所謂惑也且如愛其人而欲之生明日惡之而欲其死世豈有是理好惡亂其外而內惑矣人之生死豈不在天與人君乎而我欲制其短長之命是誠不可能也徒為紛紛祇益繆爾人能於此辨惑暸然甚明則惑不待解而破矣誠不以富亦祇以異者猶諺所謂羣鳥噪人不死祇益可憎耳齊景公問政於孔子孔子對曰君君臣臣父父子子公曰善哉信如君不君臣不臣父不父子不子雖有粟吾得而食諸齊自莊公之亂又陳氏久専國政無君臣之分久矣景公之夫人燕姬生子不成而死諸子鬻姒之子荼嬖景公不立太子將卒使高國立荼置羣公子于萊明年陳僖子立公子陽生而殺荼齊自此亂竟亡於陳氏是景公之時君臣父子之道皆失故聖人之對及此當是時齊之君臣無上下皆知陳氏之篡齊但其事已成就視俯默咨嗟嘆息付之無可奈何而已景公與晏子坐于路寢公嘆曰美哉室其誰有此乎晏子曰敢問何謂也公曰吾以為在德對曰如君之言其陳氏乎公曰善哉是可若何對曰惟禮可以已之公曰善哉寡人今而後聞此禮之上也景公晏子之對問與此一段相似此其心分明知陳氏將有齊國而無如之何雖有粟吾得而食諸此意甚可哀也然則陳氏之事終不可弭乎易曰屯其膏小正吉大正凶伊川曰當屯其膏之時而欲大正則凶如魯昭公高貴鄉公是也當是時景公晏子自顧其德不足以弭亂只得容忍無為速禍之計故胸中甚分明而外面行不得也然則如之何而可也非有夫子墮三都之德是皆為魯昭公高貴鄉公之事也昔景公欲用孔子以尼溪之田封之晏子沮之曰儒者滑稽而不可執法倨傲自順不可以為下今孔子盛容飾繁登降揖遜之節纍世不能殫其學當年不能究其禮君欲用之以移齊俗非所以先細民也嗚呼晏子知禮之可以巳齊亂而不知夫子之可以行禮也使景公略知用夫子則陳氏之亂不動聲色而齊可無事今晏子之言及此是亡齊者非陳氏也晏子也子曰片言可以折獄者其由也與子路無宿諾折獄與聽訟不同何謂折獄蓋治獄之官輕重出入各有私見而獄不能決徐以一言定其可否莫敢不聽此之謂折獄非聽訟之謂也書所謂非佞折獄惟良折獄是也子路無宿諾是其平日未嘗欺人故一言而人莫不信之子曰聽訟吾猶人也必也使無訟乎此一段不是為子路發所謂聽訟吾猶人也必也使無訟乎者只是一事蓋聽而辨其曲直是服其言未服其心也必使之感悔自訟釋讐解怨不爭而去是所謂無訟也此事關於所學其得失在已非由人也子張問政子曰居之無倦行之以忠晉荀息曰臣竭其股肱之力加之以忠正不濟則以死繼之苟知此理人人皆可以為忠子張問政子曰居之無倦行之以忠苟知此理人人皆可以為政大學曰心誠求之雖不中不逺矣人患不能自盡其心爾何事不可為子張之失正在此蓋務外飾者必有驕惰之情久而必厭子曰君子博學於文約之以禮亦可以弗畔矣夫解見雍也子曰君子成人之美不成人之惡小人反是今人多言見人做事須成就教他成亦是好事固是如此然亦須是分别善惡若果是美事豈可不成就之若是不好事其意以善為之而不知其非義方鋭意不顧豈可不百方勸諌寧使人有沮壞成事之名而不可使吾有負此心之責若小人則反是見不好事往往與己意合力勸成之若美事未必合其意沮格不行者多矣季康子問政於孔子孔子對曰政者正也子帥以正孰敢不正季康子患盜問於孔子孔子對曰苟子之不欲雖賞之不竊此一段見聖人功用妙處隂有以轉季康子之心而使不忌季氏在魯無復君臣之禮魯之臣子其不正者孰有大於季氏蓋魯之巨盜也觀聖人子帥以正與苟子不欲兩語若委重於季康子之意然觀其意雖春秋之嚴不過是也昔仲弓為季氏宰問政子曰先有司夫魯之亂正是君臣侵權犯分無復常職若使卿大夫各有司存則三威退聽於家三軍不作八佾不舞泰山不旅田賦不用魯之君臣豈不大治今使康子一旦有感於聖人之言反而求之吾身感悔震懼其功用當何如此聖人之旨意也季康子問政於孔子曰如殺無道以就有道何如孔子對曰子為政焉用殺子欲善而民善矣君子之德風小人之德草草上之風必偃老子曰民常不畏死奈何以死懼之善哉言乎今天下之人日夜趨於死亡姦民日蹈陷穽何嘗真畏死乎民不畏死而欲以死懼之雖堯舜不能也季康子論政立意在殺以為若殺無道可以就有道却不知就有道則可以止無道若殺無道以就有道世無是理也聖人不暇與之論是非直就康子身上教之子為政焉用殺之語婉而有直體雖使天下之惡人聞之猶當革心易慮蓋康子方執魯權使其狼戾殺人亦魯國之巨害聖人一言可以使之感悔知過所謂仁人之言其利溥也季康子視三家與其父兄中差可語故聖人隨其資質多方勸誘之如論語所載季康子兩問政患盜問使民敬忠以勸門弟子好學左氏載用田賦事季康子使冉有訪諸仲尼孔子在衛季康子以幣召之聖人自衛反魯觀此則季康子亦略知有聖人矣子張問士何如斯可謂之達矣子曰何哉爾所謂達者子張對曰在邦必聞在家必聞子曰是聞也非達也夫達也者質直而好義察言而觀色慮以下人在邦必達在家必達夫聞也者色取仁而行違居之不疑在邦必聞在家必聞達非明達之達乃是達于搜狩達于道路之達聞與達所以異者達是自我推之聞是自他人知之爾質直而好義察言而觀色慮以下人三句只是一箇誠實事事自點檢不敢自侈大以欺人能如此看在何處皆有以先施之若聞不聞則在人固不可必也彼聞則不然直以智力取聲名今人所以不敢欺人者正是赧然有所不安於其中若公然以色取仁􅟠然行之而不愧則亦何遽不足以欺世盜名哉慮以下人是一事言以身下人固難非賢者豈宜輕以身下之亦雖少入思慮可也察言而觀色是自點檢也樊遲從遊於舞雩之下曰敢問崇德修慝辨惑子曰善哉問先事後得非崇德與攻其惡無攻人之惡非修慝與一朝之忿忘其身以及其親非惑與善哉問只是問得親切却不比泛然之問真有意改過遷善也先事後得只是事合當做且做向前去不必計較得失做來做去却自然會廣大禮人不答吾當反敬見人不賢吾當自省自點檢恐不及何暇問他人之惡此可謂自修矣人之所甚愛者親也其次身也一朝之忿遂至不顧是其所為如醉如狂可不謂之大惑乎人若能於此處察之則凡所謂惑者亦可哀矣辨惑若此庶幾知天下之惑無大於此者他惑其有瘳乎樊遲問仁子曰愛人問知子曰知人樊遲未達子曰舉直錯諸枉能使枉者直樊遲退見子夏曰鄉也吾見於夫子而問知子曰舉直錯諸枉能使枉者直何謂也子夏曰富哉言乎舜有天下選於衆舉臯陶不仁者逺矣湯有天下選於衆舉伊尹不仁者逺矣橫渠以為舉直錯諸枉兼答仁智説得甚深切恐經意未然蓋樊遲自謂子夏言鄉者吾見於夫子而問知不曾説仁若説子夏謂不仁者逺是兼説仁智然樊遲問仁子夏不知也蓋愛人謂之仁知人謂之智此學者所共知也樊遲有何未達而疑之蓋樊遲所以未達者知人之説也如仲弓所謂焉知賢才而舉之齊王所謂吾何以識其不才而舍之之類也聖人之意以為人不易知如何人人知得但舉直錯諸枉便是為知人之法也樊遲又理會未得舉直錯枉了如何會使枉者直子夏推原此道以為帝王之治天下亦不過此道故曰富哉言乎舜只是舉一臯陶湯只是舉一伊尹不仁自逺豈非所謂枉者直乎舉帝王己行證夫子之言則樊遲之問釋然矣子貢問友子曰忠告而善道之不可則止毋自辱焉然則何取於朋友士有爭友則身不離於令名今而曰不可則止是懷不盡於朋友也或者曰以全交也嗚呼所謂全交者不竭人之歡不盡人之忠耳有過而不能爭是足以為全交乎夫朋友有相死之義不可則止獨不可再三乎故吾以謂此聖人論擇交法也昔子夏之門人論交於子張曰子夏曰可者與之其不可者拒之子張曰異乎吾所聞我之大賢歟於人何所不容我之不賢歟人將拒我如之何其拒人也二子論交皆有所偏聖人之論則不然不盡納亦不遽絶人相與之初未相知心一見語契固不在論或意以為不可亦未可遽絶忠告善道果不可則止不必與之友矣毋自辱焉與毋友不如己意相似辱如禮記所謂辱與彌牟之弟遊之辱非危辱之辱也曾子曰君子以文會友以友輔仁君子以文會友所謂粲然有文以相接是也詩曰朋友攸攝攝以威儀蓋不如是則幾於褻而不可久矣以友輔仁者凡為是威儀於外是所以輔養其內也石鼓論語答問卷中
